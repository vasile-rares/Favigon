name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    backend:
        name: Build & Test Backend
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "9.0.x"

            - name: Restore
              run: dotnet restore Backend/Favigon.sln

            - name: Build
              run: dotnet build Backend/Favigon.sln -c Release --no-restore

            - name: Test
              run: dotnet test Backend/Favigon.Tests/Favigon.Tests.csproj -c Release --no-build --verbosity normal

    frontend:
        name: Build Frontend
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"
                  cache-dependency-path: Frontend/package-lock.json

            - name: Install
              working-directory: Frontend
              run: npm ci

            - name: Build
              working-directory: Frontend
              run: npm run build
