services:
    db:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: FavigonDb
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d FavigonDb"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - internal

    api:
        build:
            context: ./Backend
        environment:
            ASPNETCORE_ENVIRONMENT: Production
            ASPNETCORE_URLS: http://+:8080
            ConnectionStrings__FavigonDb: "Host=db;Port=5432;Database=FavigonDb;Username=postgres;Password=${POSTGRES_PASSWORD}"
            JwtSettings__Key: ${JWT_KEY}
            JwtSettings__Issuer: FavigonAPI
            JwtSettings__Audience: FavigonClient
            JwtSettings__AccessTokenMinutes: 360
            JwtSettings__RefreshTokenDays: 30
            GithubOAuth__ClientId: ${GH_OAUTH_CLIENT_ID}
            GithubOAuth__ClientSecret: ${GH_OAUTH_CLIENT_SECRET}
            GoogleOAuth__ClientId: ${GOOGLE_OAUTH_CLIENT_ID}
            GoogleOAuth__ClientSecret: ${GOOGLE_OAUTH_CLIENT_SECRET}
            GoogleOAuth__RedirectUri: ${APP_URL}/login
            Client__BaseUrl: ${APP_URL}
            Cors__AllowedOrigins__0: ${APP_URL}
            PasswordReset__TokenMinutes: 30
            Email__FromEmail: ${EMAIL_FROM}
            Email__FromName: Favigon
            Email__SmtpHost: ${EMAIL_SMTP_HOST}
            Email__SmtpPort: ${EMAIL_SMTP_PORT:-587}
            Email__EnableSsl: "true"
            Email__SmtpUsername: ${EMAIL_SMTP_USERNAME}
            Email__SmtpPassword: ${EMAIL_SMTP_PASSWORD}
        depends_on:
            db:
                condition: service_healthy
        networks:
            - internal

    frontend:
        build:
            context: ./Frontend
        depends_on:
            - api
        networks:
            - internal

    cloudflared:
        image: cloudflare/cloudflared:latest
        command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
        depends_on:
            - frontend
        restart: unless-stopped
        networks:
            - internal

volumes:
    postgres_data:

networks:
    internal:
        driver: bridge
