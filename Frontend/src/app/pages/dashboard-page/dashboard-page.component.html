<div class="dashboard-layout">
  <!-- Top Navigation Bar (Consistent with Canvas) -->
  <header class="top-bar">
    <div class="top-bar-left">
      <div class="logo-button">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#ececec" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 17L12 22L22 17" stroke="#ececec" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2 12L12 17L22 12" stroke="#ececec" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="breadcrumbs">
        <div class="breadcrumb-item">
          <span class="org-color"></span>
          <span>Acme Corp</span>
        </div>
        <span class="breadcrumb-separator">/</span>
        <div class="breadcrumb-item active">
          <span>Dashboard</span>
        </div>
      </div>
    </div>

    <div class="top-bar-right">
      <button class="icon-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <span>Search</span>
      </button>
      <div class="user-avatar" (click)="logout()" title="Logout"></div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="dashboard-content">
    <div class="content-header">
      <div class="header-texts">
        <h1>Projects</h1>
        <p>Manage and organize your design projects.</p>
      </div>
      <button class="primary-btn" (click)="createNewProject()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        New Project
      </button>
    </div>

    <div class="projects-grid">
      @for (project of projects(); track project.id) {
        <div class="project-card" (click)="openProject(project.id)">
          <div class="card-preview">
            <div class="preview-placeholder">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
              </svg>
            </div>
            <div class="project-overlay">
              <button class="open-btn">Open Editor</button>
            </div>
          </div>
          <div class="card-info">
            <div class="info-main">
              <h3>{{ project.name }}</h3>
              <span class="edited-date">Edited {{ project.lastEdited | date:'MMM d, y' }}</span>
            </div>
            <button class="options-btn" (click)="$event.stopPropagation()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="1"></circle>
                <circle cx="12" cy="5" r="1"></circle>
                <circle cx="12" cy="19" r="1"></circle>
              </svg>
            </button>
          </div>
        </div>
      }
    </div>
  </main>
</div>
