<div class="dashboard-layout">
  <!-- Top Navigation Bar (Consistent with Canvas) -->
  <app-header-bar (logoutRequested)="logout()"></app-header-bar>

  <!-- Main Content Area -->
  <main class="dashboard-content">
    <div class="content-header">
      <div class="header-texts">
        <h1>Projects</h1>
        <p>Manage and organize your design projects.</p>
      </div>
      <button class="primary-btn" (click)="createNewProject()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        New Project
      </button>
    </div>

    <div class="projects-grid">
      @for (project of projects(); track project.id) {
        <div class="project-card" (click)="openProject(project.id)">
          <div class="card-preview">
            <div class="preview-placeholder">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
              </svg>
            </div>
            <div class="project-overlay">
              <button class="open-btn">Open Editor</button>
            </div>
          </div>
          <div class="card-info">
            <div class="info-main">
              <h3>{{ project.name }}</h3>
              <span class="edited-date">Edited {{ project.lastEdited | date:'MMM d, y' }}</span>
            </div>
            <button class="options-btn" (click)="$event.stopPropagation()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="1"></circle>
                <circle cx="12" cy="5" r="1"></circle>
                <circle cx="12" cy="19" r="1"></circle>
              </svg>
            </button>
          </div>
        </div>
      }
    </div>
  </main>
</div>
