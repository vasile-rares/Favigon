<div class="settings-layout">
  <app-header-bar></app-header-bar>

  <div class="settings-container">
    <div class="settings-content-wrapper">

      <!-- Custom Tabs Navigation -->
      <div class="settings-tabs-list">
        <button
          class="tab-trigger"
          [class.active]="activeTab === 'account'"
          (click)="setActiveTab('account')">
          Account
        </button>
        <button
          class="tab-trigger"
          [class.active]="activeTab === 'password'"
          (click)="setActiveTab('password')">
          Security
        </button>
      </div>

      <!-- Tab Content Area -->
      <div class="settings-tab-content">

        <!-- Account Tab -->
        <div *ngIf="activeTab === 'account'" class="settings-card fade-in">
          <div class="card-header">
            <h3 class="card-title">Account</h3>
            <p class="card-description">Update your account information.</p>
          </div>
          <div class="card-body">
            <div class="form-group">
              <label for="account-name" class="form-label">Name</label>
              <input id="account-name" type="text" class="form-input" value="Michael Brown" />
            </div>
            <div class="form-group">
              <label for="account-email" class="form-label">Email</label>
              <input id="account-email" type="email" class="form-input" value="michael.brown@example.com" />
            </div>
          </div>
          <div class="card-footer">
            <button class="btn-primary">Save changes</button>
          </div>
        </div>

        <!-- Password Tab -->
        <div *ngIf="activeTab === 'password'" class="settings-card fade-in">
          <div class="card-header">
            <h3 class="card-title">Password and Authentication</h3>
            <p class="card-description">Change your password here.</p>
          </div>
          <div class="card-body">
            <div class="form-group">
              <label for="current-password" class="form-label">Current password</label>
              <input id="current-password" type="password" class="form-input" />
            </div>
            <div class="form-group">
              <label for="new-password" class="form-label">New password</label>
              <input id="new-password" type="password" class="form-input" />
            </div>
          </div>
          <div class="card-footer">
            <button class="btn-primary">Update password</button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
