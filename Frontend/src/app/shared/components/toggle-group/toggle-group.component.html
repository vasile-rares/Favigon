<div
  class="toggle-group"
  role="group"
  [attr.aria-label]="ariaLabel"
  [class.toggle-group--stretch]="stretch"
  [style.min-width]="minWidth"
  [style.--toggle-group-count]="options.length"
  [style.--toggle-group-active-index]="activeIndex">
  <div class="toggle-group__indicator" [class.toggle-group__indicator--hidden]="!hasActiveOption"></div>

  <button
    type="button"
    class="toggle-group__button"
    *ngFor="let option of options"
    [class.is-active]="isActive(option)"
    [class.toggle-group__button--icon-only]="!!option.icon && !option.label"
    [attr.aria-pressed]="isActive(option)"
    [attr.aria-label]="option.ariaLabel ?? option.label"
    [title]="option.title ?? option.label"
    (click)="onOptionClick(option)">
    <span class="toggle-group__button-content" [class.toggle-group__button-content--icon-only]="!!option.icon && !option.label">
      <span *ngIf="option.icon" class="toggle-group__icon" aria-hidden="true">
        <svg *ngIf="option.icon === 'direction-horizontal'" class="toggle-group__icon-svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 8H14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
          <path d="M4.75 5.25L2 8L4.75 10.75" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M11.25 5.25L14 8L11.25 10.75" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <svg *ngIf="option.icon === 'direction-vertical'" class="toggle-group__icon-svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2V14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
          <path d="M5.25 4.75L8 2L10.75 4.75" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M5.25 11.25L8 14L10.75 11.25" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <svg *ngIf="option.icon === 'align-horizontal-start'" class="toggle-group__icon-svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2.5" y="2.5" width="11" height="11" rx="2.25" stroke="currentColor" stroke-opacity="0.28" />
          <rect x="4" y="3.75" width="2.2" height="2.2" rx="0.7" fill="currentColor" />
          <rect x="4" y="6.9" width="2.2" height="2.2" rx="0.7" fill="currentColor" />
          <rect x="4" y="10.05" width="2.2" height="2.2" rx="0.7" fill="currentColor" />
        </svg>
        <svg *ngIf="option.icon === 'align-horizontal-center'" class="toggle-group__icon-svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2.5" y="2.5" width="11" height="11" rx="2.25" stroke="currentColor" stroke-opacity="0.28" />
          <rect x="6.9" y="3.75" width="2.2" height="2.2" rx="0.7" fill="currentColor" />
          <rect x="6.9" y="6.9" width="2.2" height="2.2" rx="0.7" fill="currentColor" />
          <rect x="6.9" y="10.05" width="2.2" height="2.2" rx="0.7" fill="currentColor" />
        </svg>
        <svg *ngIf="option.icon === 'align-horizontal-end'" class="toggle-group__icon-svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2.5" y="2.5" width="11" height="11" rx="2.25" stroke="currentColor" stroke-opacity="0.28" />
          <rect x="9.8" y="3.75" width="2.2" height="2.2" rx="0.7" fill="currentColor" />
          <rect x="9.8" y="6.9" width="2.2" height="2.2" rx="0.7" fill="currentColor" />
          <rect x="9.8" y="10.05" width="2.2" height="2.2" rx="0.7" fill="currentColor" />
        </svg>
        <svg *ngIf="option.icon === 'align-vertical-start'" class="toggle-group__icon-svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2.5" y="2.5" width="11" height="11" rx="2.25" stroke="currentColor" stroke-opacity="0.28" />
          <rect x="3.75" y="4" width="2.2" height="2.2" rx="0.7" fill="currentColor" />
          <rect x="6.9" y="4" width="2.2" height="2.2" rx="0.7" fill="currentColor" />
          <rect x="10.05" y="4" width="2.2" height="2.2" rx="0.7" fill="currentColor" />
        </svg>
        <svg *ngIf="option.icon === 'align-vertical-center'" class="toggle-group__icon-svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2.5" y="2.5" width="11" height="11" rx="2.25" stroke="currentColor" stroke-opacity="0.28" />
          <rect x="3.75" y="6.9" width="2.2" height="2.2" rx="0.7" fill="currentColor" />
          <rect x="6.9" y="6.9" width="2.2" height="2.2" rx="0.7" fill="currentColor" />
          <rect x="10.05" y="6.9" width="2.2" height="2.2" rx="0.7" fill="currentColor" />
        </svg>
        <svg *ngIf="option.icon === 'align-vertical-end'" class="toggle-group__icon-svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2.5" y="2.5" width="11" height="11" rx="2.25" stroke="currentColor" stroke-opacity="0.28" />
          <rect x="3.75" y="9.8" width="2.2" height="2.2" rx="0.7" fill="currentColor" />
          <rect x="6.9" y="9.8" width="2.2" height="2.2" rx="0.7" fill="currentColor" />
          <rect x="10.05" y="9.8" width="2.2" height="2.2" rx="0.7" fill="currentColor" />
        </svg>
        <svg *ngIf="option.icon === 'text-align-left'" class="toggle-group__icon-svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="2.5" width="12" height="1.6" rx="0.8" fill="currentColor" />
          <rect x="2" y="7.2" width="7.5" height="1.6" rx="0.8" fill="currentColor" />
          <rect x="2" y="11.9" width="10" height="1.6" rx="0.8" fill="currentColor" />
        </svg>
        <svg *ngIf="option.icon === 'text-align-center'" class="toggle-group__icon-svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="2.5" width="12" height="1.6" rx="0.8" fill="currentColor" />
          <rect x="4.25" y="7.2" width="7.5" height="1.6" rx="0.8" fill="currentColor" />
          <rect x="3" y="11.9" width="10" height="1.6" rx="0.8" fill="currentColor" />
        </svg>
        <svg *ngIf="option.icon === 'text-align-right'" class="toggle-group__icon-svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="2.5" width="12" height="1.6" rx="0.8" fill="currentColor" />
          <rect x="6.5" y="7.2" width="7.5" height="1.6" rx="0.8" fill="currentColor" />
          <rect x="4" y="11.9" width="10" height="1.6" rx="0.8" fill="currentColor" />
        </svg>
        <svg *ngIf="option.icon === 'text-align-justify'" class="toggle-group__icon-svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2" y="2.5" width="12" height="1.6" rx="0.8" fill="currentColor" />
          <rect x="2" y="7.2" width="12" height="1.6" rx="0.8" fill="currentColor" />
          <rect x="2" y="11.9" width="12" height="1.6" rx="0.8" fill="currentColor" />
        </svg>
        <svg *ngIf="option.icon === 'radius-full'" class="toggle-group__icon-svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="3" y="3" width="10" height="10" rx="2.75" stroke="currentColor" stroke-width="1.5" />
        </svg>
        <svg *ngIf="option.icon === 'radius-corners'" class="toggle-group__icon-svg toggle-group__icon-svg--radius-corners" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M5.75 3H3V5.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M10.25 3H13V5.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M13 10.25V13H10.25" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M5.75 13H3V10.25" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          <circle cx="8" cy="8" r="1.15" fill="currentColor" />
        </svg>
        <svg *ngIf="option.icon === 'spacing-all'" class="toggle-group__icon-svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2.5" y="2.5" width="11" height="11" rx="2.25" stroke="currentColor" stroke-opacity="0.3" />
          <rect x="5" y="5" width="6" height="6" rx="1.3" stroke="currentColor" stroke-width="1.4" />
        </svg>
        <svg *ngIf="option.icon === 'spacing-sides'" class="toggle-group__icon-svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <rect x="2.5" y="2.5" width="11" height="11" rx="2.25" stroke="currentColor" stroke-opacity="0.3" />
          <path d="M8 3.6V5.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <path d="M12.4 8H10.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <path d="M8 12.4V10.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <path d="M3.6 8H5.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          <circle cx="8" cy="8" r="1.05" fill="currentColor" />
        </svg>
      </span>
      <span *ngIf="option.label" class="toggle-group__label">{{ option.label }}</span>
    </span>
  </button>
</div>
