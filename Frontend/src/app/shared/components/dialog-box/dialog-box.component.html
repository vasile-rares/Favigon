<div
  class="dialog-box__layer"
  [class.dialog-box__layer--blur]="blurBackdrop"
  [class.is-closing]="isClosing"
  [style.--dialog-box-width]="width"
  (pointerdown)="onBackdropPointerDown($event)"
  (click)="onBackdropClick($event)">
  <section
    class="dialog-box__card"
    role="dialog"
    aria-modal="true"
    [attr.aria-labelledby]="ariaLabelledBy || null"
    [attr.aria-label]="ariaLabel || null"
    (pointerdown)="onDialogPointerDown()"
    (click)="$event.stopPropagation()">
    @if (hasHeader || showCloseButton) {
      <header class="dialog-box__header" [class.dialog-box__header--compact]="!hasHeader">
        <div class="dialog-box__header-main">
          @if (hasHeader) {
            <div class="dialog-box__title">
              <ng-content select="[dialogTitle]"></ng-content>
            </div>
          }

          @if (showCloseButton) {
            <button
              type="button"
              class="dialog-box__close-btn"
              (click)="requestClose()"
              [disabled]="isBusy || isClosing"
              aria-label="Close dialog">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          }
        </div>

        @if (hasHeader) {
          <div class="dialog-box__description">
            <ng-content select="[dialogDescription]"></ng-content>
          </div>
        }
      </header>
    }

    <div class="dialog-box__content">
      <ng-content select=":not([dialogTitle]):not([dialogDescription]):not([dialogFooter])"></ng-content>
    </div>

    @if (hasFooter) {
      <footer class="dialog-box__footer">
        <ng-content select="[dialogFooter]"></ng-content>
      </footer>
    }
  </section>
</div>
