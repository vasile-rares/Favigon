<div
  class="project-dialog-layer"
  [class.is-closing]="isClosing"
  (pointerdown)="onBackdropPointerDown($event)"
  (click)="onBackdropClick($event)">
  <section
    class="project-dialog-card"
    role="dialog"
    aria-modal="true"
    aria-labelledby="project-dialog-title"
    (pointerdown)="onDialogPointerDown()"
    (click)="$event.stopPropagation()">
    <header class="project-dialog-header">
      <div>
        <h2 id="project-dialog-title">Create project</h2>
        <p>Set up your project details. You can adjust settings later from project options.</p>
      </div>
      <button type="button" class="dialog-close-btn" (click)="onCancel()" [disabled]="isSubmitting || isClosing" aria-label="Close dialog">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </header>

    <form class="project-dialog-form" [formGroup]="form" (ngSubmit)="onSubmit()">
      <app-text-input
        id="project-name"
        label="Project name"
        placeholder="Project name"
        formControlName="name"
        [requiredMarker]="true"
        [maxLength]="120"
        [errorText]="'Project name is required.'"></app-text-input>

      <app-dropdown-select
        id="project-visibility"
        label="Visibility"
        placeholder="Select visibility"
        [enableSearch]="false"
        [options]="visibilityOptions"
        formControlName="isPublic"></app-dropdown-select>

      <footer class="project-dialog-footer">
        <app-action-button
          type="button"
          variant="outline"
          [fullWidth]="false"
          [disabled]="isSubmitting || isClosing"
          (clicked)="onCancel()">
          Cancel
        </app-action-button>
        <app-action-button
          type="submit"
          variant="primary"
          [fullWidth]="false"
          [disabled]="isSubmitting || isClosing || form.invalid">
          {{ isSubmitting ? 'Creating...' : 'Create project' }}
        </app-action-button>
      </footer>
    </form>
  </section>
</div>
