<div class="canvas-layout">
  <app-header-bar></app-header-bar>

  <div class="workspace">
    <app-canvas-left-panel
      [selectedFramework]="selectedFramework()"
      [validationResult]="validationResult()"
      [apiError]="apiError()"
      [isValidating]="isValidating()"
      [isGenerating]="isGenerating()"
      [generatedHtml]="generatedHtml()"
      [generatedCss]="generatedCss()"
      [irPreview]="irPreview()"
      [elements]="elements()"
      [selectedElementId]="selectedElementId()"
      (frameworkChanged)="setFramework($event)"
      (validateRequested)="validateIR()"
      (generateRequested)="generateCode()"
      (layerSelected)="onLayerSelected($event)"
      (layerNameChanged)="onLayerNameChanged($event)"></app-canvas-left-panel>

    <aside class="toolbar">
      <!-- <div class="toolbar-header">
        <h2>Prismatic</h2>
      </div> -->
      <!-- Removed header since we have top bar now -->
      <div class="tools">
        <button
          [class.active]="currentTool() === 'select'"
          (click)="selectTool('select')"
          title="Select (V)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 3 7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="m13 13 6 6"/></svg>
        </button>
        <button
          [class.active]="currentTool() === 'frame'"
          (click)="selectTool('frame')"
          title="Frame (F)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
        </button>
        <button
          [class.active]="currentTool() === 'rectangle'"
          (click)="selectTool('rectangle')"
          title="Rectangle (R)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/></svg>
        </button>
        <button
          [class.active]="currentTool() === 'circle'"
          (click)="selectTool('circle')"
          title="Circle (O)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>
        </button>
        <button
          [class.active]="currentTool() === 'text'"
          (click)="selectTool('text')"
          title="Text (T)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" x2="15" y1="20" y2="20"/><line x1="12" x2="12" y1="4" y2="20"/></svg>
        </button>
        <button
          [class.active]="currentTool() === 'image'"
          (click)="selectTool('image')"
          title="Image (I)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/></svg>
        </button>
      </div>
    </aside>

    <main
      class="canvas-container"
      [class.pan-ready]="isPanReady()"
      [class.panning]="isPanning()"
      [style.background-size]="canvasBackgroundSize()"
      [style.background-position]="canvasBackgroundPosition()"
      (pointerdown)="onCanvasPointerDown($event)"
      (click)="onCanvasClick($event)"
      (wheel)="onCanvasWheel($event)">
      <div class="zoom-controls" (click)="$event.stopPropagation()">
        <button type="button" (click)="zoomOut()" title="Zoom out">-</button>
        <button type="button" class="zoom-percentage" (click)="resetZoom()" title="Reset zoom">
          {{ zoomPercentage() }}%
        </button>
        <button type="button" (click)="zoomIn()" title="Zoom in">+</button>
      </div>

      <div class="canvas-viewport" [style.transform]="canvasViewportTransform()">
        <div
          *ngFor="let el of elements()"
          class="canvas-element"
          [class.selected]="selectedElementId() === el.id"
          [class.frame]="el.type === 'frame'"
          [class.rectangle]="el.type === 'rectangle'"
          [class.circle]="el.type === 'circle'"
          [class.text]="el.type === 'text'"
          [class.image]="el.type === 'image'"
          [style.left.px]="el.x"
          [style.top.px]="el.y"
          [style.width.px]="el.width"
          [style.height.px]="el.height"
          [style.background-color]="el.type !== 'text' && el.type !== 'image' ? el.fill : 'transparent'"
          [style.border]="getElementBorderStyle(el)"
          [style.outline]="getElementOutlineStyle(el)"
          [style.outline-offset.px]="getElementOutlineOffset(el)"
          [style.opacity]="el.opacity ?? 1"
          [style.border-radius.px]="el.type === 'circle' ? null : (el.cornerRadius ?? (el.type === 'image' ? 6 : 0))"
          (pointerdown)="onElementPointerDown($event, el.id)">

          <ng-container *ngIf="el.type === 'text'">
            <span [style.font-size.px]="el.fontSize">{{ el.text }}</span>
          </ng-container>

          <ng-container *ngIf="el.type === 'image'">
            <img [src]="el.imageUrl" alt="Canvas image" draggable="false" />
          </ng-container>

          <div class="selection-outline" *ngIf="selectedElementId() === el.id">
            <button
              type="button"
              class="resize-handle resize-handle-se"
              (pointerdown)="onResizeHandlePointerDown($event, el.id)"
              aria-label="Resize element"></button>
          </div>
        </div>
      </div>
    </main>

    <app-canvas-design-sidepanel
      [selectedElement]="selectedElement()"
      [currentTool]="currentTool()"
      (frameTemplateSelected)="onFrameTemplateSelected($event)"
      (elementPatch)="onSelectedElementPatch($event)"></app-canvas-design-sidepanel>
  </div>
</div>
