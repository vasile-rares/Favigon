<div class="rp-shell">
  <div class="rp-card" #card>
    <div class="rp-head">
      <h1 class="rp-title">Reset password</h1>
      <p class="rp-text">Choose a new password for your account.</p>
    </div>

    @if (!hasValidToken()) {
      <p class="rp-error-msg">Password reset link is invalid or missing.</p>
      <div class="rp-foot">
        <button type="button" class="rp-btn rp-btn--quiet" (click)="goToLogin()">Back to sign in</button>
      </div>
    } @else {
      <form class="rp-form" [formGroup]="form" (ngSubmit)="submit()" autocomplete="off">
        <label class="rp-field">
          <span class="rp-label">New password</span>
          <div class="rp-input-wrap">
            <input
              class="rp-input"
              [type]="showPassword() ? 'text' : 'password'"
              id="reset-password"
              placeholder="New password"
              autocomplete="new-password"
              formControlName="password"
              maxlength="100" />
            <button type="button" class="rp-eye" (click)="showPassword.set(!showPassword())" [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'">
              @if (showPassword()) {
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              }
            </button>
          </div>
          @if (form.controls.password.invalid && form.controls.password.dirty) {
            <div class="rp-password-rules">
              @if (form.controls.password.hasError('weakPassword') || form.controls.password.hasError('minlength')) {
                <p class="rp-password-rules__item">— Must be at least 8 characters.</p>
                <p class="rp-password-rules__item">— Must contain a number, uppercase and lowercase letter.</p>
              } @else if (form.controls.password.hasError('required')) {
                <p class="rp-password-rules__item">— Password is required.</p>
              }
            </div>
          }
        </label>

        <label class="rp-field">
          <span class="rp-label">Confirm password</span>
          <div class="rp-input-wrap">
            <input
              class="rp-input"
              [type]="showConfirmPassword() ? 'text' : 'password'"
              id="reset-confirm-password"
              placeholder="Repeat your new password"
              autocomplete="new-password"
              formControlName="confirmPassword"
              maxlength="100" />
            <button type="button" class="rp-eye" (click)="showConfirmPassword.set(!showConfirmPassword())" [attr.aria-label]="showConfirmPassword() ? 'Hide password' : 'Show password'">
              @if (showConfirmPassword()) {
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              }
            </button>
          </div>
          @if (form.controls.confirmPassword.invalid && form.controls.confirmPassword.dirty) {
            <p class="rp-password-rules__item">
              {{ form.controls.confirmPassword.hasError('required') ? '— Please confirm your password.' : '— Passwords do not match.' }}
            </p>
          }
        </label>

        @if (statusMessage()?.type === 'error') {
          <p class="rp-error-msg">{{ statusMessage()!.text }}</p>
        }

        <div class="rp-foot">
          @if (statusMessage()?.type === 'success') {
            <p class="rp-success-msg">{{ statusMessage()!.text }}</p>
            <button type="button" class="rp-btn rp-btn--quiet" (click)="goToLogin()">Back to sign in</button>
          } @else {
            <button type="submit" class="rp-btn rp-btn--primary" [disabled]="isSubmitting()">
              {{ isSubmitting() ? 'Resetting...' : 'Reset password' }}
            </button>
          }
        </div>
      </form>
    }
  </div>
</div>
