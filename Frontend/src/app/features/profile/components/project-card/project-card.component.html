<article class="project-card" [class.project-card--busy]="isBusy">
  <button
    type="button"
    class="project-card__open project-card__open--media"
    [disabled]="isBusy"
    [attr.aria-label]="'Open ' + project.name"
    (click)="openProject()">
    <div class="project-card__media">
      <div class="project-card__media-top">
        <span
          class="project-card__visibility-chip"
          [class.project-card__visibility-chip--public]="project.isPublic"
          [class.project-card__visibility-chip--private]="!project.isPublic">
          {{ project.isPublic ? 'Public' : 'Private' }}
        </span>
      </div>

      @if (project.thumbnailDataUrl) {
        <img
          class="project-card__thumbnail"
          [src]="project.thumbnailDataUrl"
          alt="Project preview"
          draggable="false" />
      } @else {
        <div class="project-card__placeholder">
          <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
        </div>
      }
    </div>
  </button>

  <div class="project-card__body">
    <p class="project-card__eyebrow">Updated {{ project.lastEdited | date:'MMM d, y' }}</p>

    <div class="project-card__headline-row">
      <button
        type="button"
        class="project-card__open project-card__open--copy"
        [disabled]="isBusy"
        [attr.aria-label]="'Open ' + project.name"
        (click)="openProject()">
        <div class="project-card__copy">
          <h3>{{ project.name }}</h3>
          <p>Created {{ project.createdAt | date:'MMM d, y' }}</p>
        </div>
      </button>

      @if (isOwner) {
        <div class="project-card__menu-anchor">
          <button
            type="button"
            class="project-card__menu-trigger"
            [disabled]="isBusy"
            [attr.aria-expanded]="isMenuOpen() && !isMenuClosing()"
            aria-label="Project options"
            (click)="toggleMenu($event)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="12" cy="5" r="1.75"></circle>
              <circle cx="12" cy="12" r="1.75"></circle>
              <circle cx="12" cy="19" r="1.75"></circle>
            </svg>
          </button>

          @if (isMenuOpen() || isMenuClosing()) {
            <div
              class="project-card__menu"
              [class.project-card__menu--open]="isMenuOpen() && !isMenuClosing()"
              [class.project-card__menu--closing]="isMenuClosing()"
              role="menu"
              aria-label="Project options menu">
              <button type="button" class="project-card__menu-item" role="menuitem" (click)="openProject()">
                Open
              </button>
              <button type="button" class="project-card__menu-item" role="menuitem" (click)="requestRename($event)">
                Rename
              </button>
              <button type="button" class="project-card__menu-item" role="menuitem" (click)="requestVisibilityToggle($event)">
                {{ visibilityActionLabel }}
              </button>
              <button
                type="button"
                class="project-card__menu-item project-card__menu-item--danger"
                role="menuitem"
                (click)="requestDelete($event)">
                Delete
              </button>
            </div>
          }
        </div>
      }
    </div>
  </div>
</article>
