<article class="project-card" [class.project-card--busy]="isBusy()">
  <button
    type="button"
    class="project-card__open project-card__open--media"
    [disabled]="isBusy()"
    [attr.aria-label]="'Open ' + project().name"
    (click)="openProject()">
    <div class="project-card__media">
      <div class="project-card__media-top">
        <span
          class="project-card__visibility-chip"
          [class.project-card__visibility-chip--public]="project().isPublic"
          [class.project-card__visibility-chip--private]="!project().isPublic">
          {{ project().isPublic ? 'Public' : 'Private' }}
        </span>
      </div>

      @if (project().thumbnailDataUrl) {
        <img
          class="project-card__thumbnail"
          [src]="project().thumbnailDataUrl"
          alt="Project preview"
          draggable="false" />
      } @else {
        <div class="project-card__placeholder">
          <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
        </div>
      }
    </div>
  </button>

  <div class="project-card__body">
    <p class="project-card__eyebrow">Updated {{ project().lastEdited | date:'MMM d, y' }}</p>

    @if (project().forkedFromProjectId) {
      <div class="project-card__fork-row">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><circle cx="18" cy="6" r="3"/><path d="M18 9v1a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9"/><line x1="12" x2="12" y1="12" y2="15"/></svg>
        <span class="project-card__fork-label">Forked from <strong>&#64;{{ project().forkedFromOwnerUsername ?? 'unknown' }}</strong></span>
      </div>
    }

    <div class="project-card__headline-row">
      <button
        type="button"
        class="project-card__open project-card__open--copy"
        [disabled]="isBusy()"
        [attr.aria-label]="'Open ' + project().name"
        (click)="openProject()">
        <div class="project-card__copy">
          <h3>{{ project().name }}</h3>
          <p>Created {{ project().createdAt | date:'MMM d, y' }}</p>
        </div>
      </button>

      @if (isOwner()) {
        <div class="project-card__menu-anchor">
          <button
            type="button"
            class="project-card__menu-trigger"
            [disabled]="isBusy()"
            [attr.aria-expanded]="isMenuOpen() && !isMenuClosing()"
            aria-label="Project options"
            (click)="toggleMenu($event)">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="12" cy="5" r="1.75"></circle>
              <circle cx="12" cy="12" r="1.75"></circle>
              <circle cx="12" cy="19" r="1.75"></circle>
            </svg>
          </button>

          @if (isMenuOpen() || isMenuClosing()) {
            <div
              class="project-card__menu"
              [class.project-card__menu--open]="isMenuOpen() && !isMenuClosing()"
              [class.project-card__menu--closing]="isMenuClosing()"
              role="menu"
              aria-label="Project options menu">
              <button type="button" class="project-card__menu-item" role="menuitem" (click)="openProject()">
                Open
              </button>
              <button type="button" class="project-card__menu-item" role="menuitem" (click)="requestRename($event)">
                Rename
              </button>
              <button type="button" class="project-card__menu-item" role="menuitem" (click)="requestVisibilityToggle($event)">
                {{ visibilityActionLabel }}
              </button>
              <button
                type="button"
                class="project-card__menu-item project-card__menu-item--danger"
                role="menuitem"
                (click)="requestDelete($event)">
                Delete
              </button>
            </div>
          }
        </div>
      } @else if (project().isPublic) {
        <button
          type="button"
          class="project-card__star-btn"
          [class.project-card__star-btn--starred]="project().isStarredByCurrentUser"
          [disabled]="isBusy()"
          [attr.aria-label]="project().isStarredByCurrentUser ? 'Unstar project' : 'Star project'"
          (click)="requestStarToggle($event)">
          @if (project().isStarredByCurrentUser) {
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          } @else {
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          }
          <span>{{ project().starCount }}</span>
        </button>
      }
    </div>
  </div>
</article>
