<article class="project-card" [class.project-card--deleting]="isDeleting">
  <button
    type="button"
    class="project-card__open"
    [disabled]="isDeleting"
    [attr.aria-label]="'Open project ' + project.name"
    (click)="openProject()">
    <div class="card-preview">
      @if (project.thumbnailDataUrl) {
        <img
          class="preview-thumbnail"
          [src]="project.thumbnailDataUrl"
          alt="Project preview"
          draggable="false" />
      } @else {
        <div class="preview-placeholder">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
        </div>
      }
      <div class="project-overlay"></div>
    </div>

    <div class="card-info">
      <div class="info-main">
        <h3>{{ project.name }}</h3>
        <span class="edited-date">Edited {{ project.lastEdited | date:'MMM d, y' }}</span>
      </div>
    </div>
  </button>

  <button
    type="button"
    class="project-card__delete"
    [disabled]="isDeleting"
    [attr.aria-label]="'Delete project ' + project.name"
    [title]="isDeleting ? 'Deleting project' : 'Delete project'"
    (click)="requestDelete($event)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 6h18"></path>
      <path d="M8 6V4h8v2"></path>
      <path d="M19 6l-1 14H6L5 6"></path>
      <path d="M10 11v6"></path>
      <path d="M14 11v6"></path>
    </svg>
  </button>
</article>
