<div [ngClass]="rootClassNames">
  <input
    class="number-input__field"
    type="number"
    [attr.aria-label]="ariaLabel"
    [value]="displayValue"
    [min]="min ?? null"
    [max]="max ?? null"
    [step]="step"
    (input)="onInputChange($event)" />

  <div class="number-input__stepper">
    <button type="button" class="number-input__stepper-btn" [attr.aria-label]="'Increase ' + ariaLabel.toLowerCase()" (pointerdown)="onStepperPointerDown(1, $event)">
      <svg class="number-input__stepper-icon" width="8" height="6" viewBox="0 0 8 6" fill="none" aria-hidden="true">
        <path d="M1 5L4 1L7 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>
    <button type="button" class="number-input__stepper-btn" [attr.aria-label]="'Decrease ' + ariaLabel.toLowerCase()" (pointerdown)="onStepperPointerDown(-1, $event)">
      <svg class="number-input__stepper-icon" width="8" height="6" viewBox="0 0 8 6" fill="none" aria-hidden="true">
        <path d="M1 1L4 5L7 1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>
  </div>
</div>
