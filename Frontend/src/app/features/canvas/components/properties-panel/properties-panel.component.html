<aside class="properties-panel glass-panel">
  <div class="properties-panel-header">
    <div class="properties-tabs">
      <app-toggle-group
        [options]="propertiesTabOptions"
        [value]="activeTab"
        [stretch]="true"
        [minWidth]="null"
        [ariaLabel]="'Properties tabs'"
        (valueChange)="onTabValueChange($event)"></app-toggle-group>
    </div>
  </div>

  <div class="properties-panel-content">

    <!-- ── Design Tab ───────────────────────────────────── -->
    @if (isTabActive('design')) {

      <app-design-tab
        [selectedElement]="selectedElement()"
        [projectId]="projectId()"
        [autoOpenFillPopupElementId]="autoOpenFillPopupElementId()"
        [pages]="pages()"
        [currentPageId]="currentPageId()"
        [currentTool]="currentTool()"
        (elementPatch)="elementPatch.emit($event)"
        (numberInputGestureStarted)="numberInputGestureStarted.emit()"
        (numberInputGestureCommitted)="numberInputGestureCommitted.emit()"
        (frameTemplateSelected)="frameTemplateSelected.emit($event)">
      </app-design-tab>

} @else {

      <app-generation-tab
        [selectedFramework]="selectedFramework()"
        [validationResult]="validationResult()"
        [apiError]="apiError()"
        [isValidating]="isValidating()"
        [isGenerating]="isGenerating()"
        [generatedHtml]="generatedHtml()"
        [generatedCss]="generatedCss()"
        [generatedFiles]="generatedFiles()"
        [irPreview]="irPreview()"
        (frameworkChanged)="frameworkChanged.emit($event)"
        (validateRequested)="validateRequested.emit()"
        (generateRequested)="generateRequested.emit()"></app-generation-tab>

}

    <!-- ── Generation Tab ───────────────────────────────── -->


  </div>
</aside>
