<!-- Layout -->
<section
  class="properties-section properties-section--collapsible"
  [class.properties-section--compact]="!hasLayout(element)"
  [class.properties-section--actionable]="!hasLayout(element)"
  (click)="!hasLayout(element) && onLayoutSectionHeaderClick()"
  *ngIf="supportsLayout(element.type)">
  <div class="properties-section-header properties-section-header--actionable" (click)="onLayoutSectionHeaderClick()">
    <p class="properties-section-title">Layout</p>
    <button
      type="button"
      class="pp-section-toggle"
      [class.pp-section-toggle--minus]="hasLayout(element)"
      [class.pp-section-toggle--plus]="!hasLayout(element)"
      [attr.aria-label]="hasLayout(element) ? 'Remove layout' : 'Add layout'"
      [title]="hasLayout(element) ? 'Remove layout' : 'Add layout'"
      (click)="onLayoutSectionToggleClick($event)">
      <svg class="pp-section-toggle__icon" viewBox="0 0 16 16" aria-hidden="true">
        <path class="pp-section-toggle__icon-line" d="M3 8H13" />
        <path class="pp-section-toggle__icon-line pp-section-toggle__icon-line--vertical" d="M8 3V13" />
      </svg>
    </button>
  </div>

  <ng-container *ngIf="hasLayout(element)">
    <div class="pp-style-row">
      <span class="pp-row-label">Display</span>
      <div class="pp-style-control">
        <app-toggle-group
          [ariaLabel]="'Layout display mode'"
          [options]="layoutDisplayOptions"
          [value]="displayValue(element)"
          [stretch]="true"
          [minWidth]="null"
          (valueChange)="onDisplayChange($event)"></app-toggle-group>
      </div>
    </div>

    <ng-container *ngIf="isFlex(element)">
      <div class="pp-style-row">
        <span class="pp-row-label">Direction</span>
        <div class="pp-style-control">
          <app-toggle-group
            [ariaLabel]="'Layout direction'"
            [options]="layoutDirectionOptions"
            [value]="flexDirectionValue(element)"
            [stretch]="true"
            [minWidth]="null"
            (valueChange)="onFlexDirectionChange($event)"></app-toggle-group>
        </div>
      </div>
      <div class="pp-style-row">
        <span class="pp-row-label">{{ justifyContentAxisLabel(element) }}</span>
        <div class="pp-style-control pp-style-control--dropdown">
          <app-dropdown-select
            [enableSearch]="false"
            [placeholder]="justifyContentPlaceholder(element)"
            [options]="justifyContentOptions"
            [ngModel]="justifyContentValue(element)"
            (ngModelChange)="onJustifyContentChange($event)"></app-dropdown-select>
        </div>
      </div>
      <div class="pp-style-row">
        <span class="pp-row-label">{{ alignItemsAxisLabel(element) }}</span>
        <div class="pp-style-control">
          <app-toggle-group
            [ariaLabel]="alignItemsAriaLabel(element)"
            [options]="alignItemsOptions(element)"
            [value]="alignItemsValue(element)"
            [stretch]="true"
            [minWidth]="null"
            (valueChange)="onAlignItemsChange($event)"></app-toggle-group>
        </div>
      </div>
      <div class="pp-style-row">
        <span class="pp-row-label">Wrap</span>
        <app-toggle-group
          [ariaLabel]="'Flex wrap'"
          [options]="wrapOptions"
          [value]="flexWrapValue(element)"
          (valueChange)="onFlexWrapToggle($event === true)">
        </app-toggle-group>
      </div>
      <div class="pp-style-row">
        <span class="pp-row-label">Gap</span>
        <div class="pp-style-control pp-style-control--metric">
          <app-number-input
            appearance="boxed"
            ariaLabel="Gap"
            [value]="element.gap ?? 0"
            [min]="0"
            [step]="1"
            (gestureStarted)="onNumberInputGestureStarted()"
            (gestureCommitted)="onNumberInputGestureCommitted()"
            (valueChange)="onNumberChange('gap', $event)" />
        </div>
      </div>
    </ng-container>

    <ng-container *ngIf="isGrid(element)">
      <div class="pp-style-row">
        <span class="pp-row-label">Columns</span>
        <div class="pp-style-control pp-style-control--transform-scale">
          <app-number-input
            appearance="boxed"
            ariaLabel="Grid columns"
            [value]="gridColumnsValue(element)"
            [min]="1"
            [step]="1"
            (gestureStarted)="onNumberInputGestureStarted()"
            (gestureCommitted)="onNumberInputGestureCommitted()"
            (valueChange)="onGridTrackCountChange('gridTemplateColumns', $event)" />
        </div>
      </div>
      <div class="pp-style-row">
        <span class="pp-row-label">Rows</span>
        <div class="pp-style-control pp-style-control--transform-scale">
          <app-number-input
            appearance="boxed"
            ariaLabel="Grid rows"
            [value]="gridRowsValue(element)"
            [min]="1"
            [step]="1"
            (gestureStarted)="onNumberInputGestureStarted()"
            (gestureCommitted)="onNumberInputGestureCommitted()"
            (valueChange)="onGridTrackCountChange('gridTemplateRows', $event)" />
        </div>
      </div>
      <div class="pp-style-row">
        <span class="pp-row-label">Gap</span>
        <div class="pp-style-control pp-style-control--transform-dual">
          <div class="pp-transform-axis-field">
            <app-number-input
              appearance="boxed"
              ariaLabel="Grid gap X"
              [value]="gridGapXValue(element)"
              [min]="0"
              [step]="1"
              (gestureStarted)="onNumberInputGestureStarted()"
              (gestureCommitted)="onNumberInputGestureCommitted()"
              (valueChange)="onGridGapChange('x', $event)"></app-number-input>
            <span class="pp-transform-axis-tag">X</span>
          </div>
          <div class="pp-transform-axis-field">
            <app-number-input
              appearance="boxed"
              ariaLabel="Grid gap Y"
              [value]="gridGapYValue(element)"
              [min]="0"
              [step]="1"
              (gestureStarted)="onNumberInputGestureStarted()"
              (gestureCommitted)="onNumberInputGestureCommitted()"
              (valueChange)="onGridGapChange('y', $event)"></app-number-input>
            <span class="pp-transform-axis-tag">Y</span>
          </div>
        </div>
      </div>
    </ng-container>

    <div class="pp-style-row pp-style-row--corner-radius">
      <span class="pp-row-label">Padding</span>
      <div class="pp-style-control pp-style-control--corner-radius">
        <div class="pp-corner-radius-header">
          <app-number-input
            appearance="compact"
            ariaLabel="Padding"
            [value]="fullPaddingInputValue(element)"
            [min]="0"
            [step]="1"
            (gestureStarted)="onNumberInputGestureStarted()"
            (gestureCommitted)="onNumberInputGestureCommitted()"
            (valueChange)="onPaddingFullChange($event)" />
          <div class="pp-corner-radius-mode">
            <app-toggle-group
              [ariaLabel]="'Padding mode'"
              [options]="paddingModeOptions"
              [value]="paddingMode(element)"
              [stretch]="true"
              [minWidth]="null"
              (valueChange)="onPaddingModeChange($event)"></app-toggle-group>
          </div>
        </div>
        <div class="pp-corner-radius-grid" *ngIf="paddingMode(element) === 'per-side'">
          <div class="pp-corner-radius-field" *ngFor="let side of paddingFields">
            <div class="pp-corner-radius-input">
              <app-number-input
                appearance="compact"
                [ariaLabel]="side.ariaLabel"
                [value]="spacingValue(element, 'padding', side.key)"
                [min]="0"
                [step]="1"
                (gestureStarted)="onNumberInputGestureStarted()"
                (gestureCommitted)="onNumberInputGestureCommitted()"
                (valueChange)="onPaddingSideChange(side.key, $event)"></app-number-input>
              <span class="pp-corner-radius-tag pp-corner-radius-tag--text" aria-hidden="true">
                {{ side.label }}
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </ng-container>
</section>
