<section class="properties-section properties-section--text">
  <p class="properties-section-title">Text</p>

  <div class="pp-style-row">
    <span class="pp-row-label">Content</span>
    <div class="pp-style-control pp-style-control--dropdown">
      <input
        type="text"
        class="pp-text-input pp-text-input--boxed"
        [value]="element().text || ''"
        (input)="onTextChange('text', $event)"
        placeholder="Text content" />
    </div>
  </div>

  <div class="pp-style-row">
    <span class="pp-row-label">Font</span>
    <div class="pp-style-control pp-style-control--dropdown">
      <app-dropdown-select
        [enableSearch]="false"
        [placeholder]="'Select font'"
        [options]="fontFamilyOptions"
        [ngModel]="fontFamilyValue(element())"
        (ngModelChange)="onTypographySelectChange('fontFamily', $event)"></app-dropdown-select>
    </div>
  </div>

  <div class="pp-style-row">
    <span class="pp-row-label">Weight</span>
    <div class="pp-style-control pp-style-control--text-style">
      <app-dropdown-select
        [enableSearch]="false"
        [placeholder]="'Select weight'"
        [options]="fontWeightOptions"
        [ngModel]="fontWeightValue(element())"
        (ngModelChange)="onTypographySelectChange('fontWeight', $event)"></app-dropdown-select>
      <div class="pp-icon-group pp-icon-group--compact">
        <button
          type="button"
          class="pp-icon-btn pp-italic-btn"
          [class.active]="fontStyleValue(element()) === 'italic'"
          (click)="setFontStyle(fontStyleValue(element()) === 'italic' ? 'normal' : 'italic')"
          title="Italic">
          <em>I</em>
        </button>
      </div>
    </div>
  </div>

  <div class="pp-style-row">
    <span class="pp-row-label">Color</span>
    <div class="pp-style-control pp-style-control--popup">
      <app-field-input
        kind="fill"
        [triggerText]="fillLabel(element())"
        [swatchColor]="fillSwatchBackground(element())"
        [isTransparent]="isTransparentFill(element())"
        [colorValue]="fillInputValue(element())"
        [pickerColor]="fillPickerValue(element())"
        [clearPatch]="{ fill: 'transparent' }"
        (patchRequested)="elementPatch.emit($event)"
        (numberGestureStarted)="onNumberInputGestureStarted()"
        (numberGestureCommitted)="onNumberInputGestureCommitted()">
      </app-field-input>
    </div>
  </div>

  <div class="pp-style-row pp-style-row--metric">
    <span class="pp-row-label">Size</span>
    <div class="pp-style-control pp-style-control--text-metric">
      <app-number-input
        appearance="compact"
        ariaLabel="Font size"
        [value]="element().fontSize || 16"
        [min]="fontSizeUnitValue(element()) === 'rem' ? 0.1 : 8"
        [step]="fontSizeUnitValue(element()) === 'rem' ? 0.01 : 1"
        (gestureStarted)="onNumberInputGestureStarted()"
        (gestureCommitted)="onNumberInputGestureCommitted()"
        (valueChange)="onNumberChange('fontSize', $event)" />
      <div class="pp-text-unit-control">
        <app-dropdown-select
          [enableSearch]="false"
          [placeholder]="'Unit'"
          [options]="fontSizeUnitOptions"
          [ngModel]="fontSizeUnitValue(element())"
          (ngModelChange)="onTextMetricUnitChange('fontSizeUnit', $event)"></app-dropdown-select>
      </div>
    </div>
  </div>

  <div class="pp-style-row pp-style-row--metric">
    <span class="pp-row-label">Letter</span>
    <div class="pp-style-control pp-style-control--text-metric">
      <app-number-input
        appearance="compact"
        ariaLabel="Letter spacing"
        [value]="element().letterSpacing ?? 0"
        [step]="0.01"
        (gestureStarted)="onNumberInputGestureStarted()"
        (gestureCommitted)="onNumberInputGestureCommitted()"
        (valueChange)="onNumberChange('letterSpacing', $event)" />
      <div class="pp-text-unit-control">
        <app-dropdown-select
          [enableSearch]="false"
          [placeholder]="'Unit'"
          [options]="textSpacingUnitOptions"
          [ngModel]="letterSpacingUnitValue(element())"
          (ngModelChange)="onTextMetricUnitChange('letterSpacingUnit', $event)"></app-dropdown-select>
      </div>
    </div>
  </div>

  <div class="pp-style-row pp-style-row--metric">
    <span class="pp-row-label">Line</span>
    <div class="pp-style-control pp-style-control--text-metric">
      <app-number-input
        appearance="compact"
        ariaLabel="Line height"
        [value]="element().lineHeight ?? 1.2"
        [min]="lineHeightUnitValue(element()) === 'em' ? 0.8 : 1"
        [step]="0.01"
        (gestureStarted)="onNumberInputGestureStarted()"
        (gestureCommitted)="onNumberInputGestureCommitted()"
        (valueChange)="onNumberChange('lineHeight', $event)" />
      <div class="pp-text-unit-control">
        <app-dropdown-select
          [enableSearch]="false"
          [placeholder]="'Unit'"
          [options]="textSpacingUnitOptions"
          [ngModel]="lineHeightUnitValue(element())"
          (ngModelChange)="onTextMetricUnitChange('lineHeightUnit', $event)"></app-dropdown-select>
      </div>
    </div>
  </div>

  <div class="pp-style-row">
    <span class="pp-row-label">Align</span>
    <div class="pp-style-control pp-style-control--text-align">
      <app-toggle-group
        [ariaLabel]="'Text alignment'"
        [options]="textAlignToggleOptions"
        [value]="textAlignValue(element())"
        [stretch]="true"
        [minWidth]="null"
        (valueChange)="onTextAlignChange($event)"></app-toggle-group>
    </div>
  </div>

</section>
