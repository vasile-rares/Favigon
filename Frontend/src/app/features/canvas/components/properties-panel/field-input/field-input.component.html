<ng-template #effectSlot><ng-content></ng-content></ng-template>

<ng-container *ngIf="inlineContentOnly; else overlayMode">
  <app-dropdown-menu
    [kind]="kind"
    [projectId]="projectId"
    [colorValue]="colorValue"
    [pickerColor]="pickerColor"
    [isTransparent]="isTransparent"
    [shadowValue]="shadowValue"
    [strokeWidth]="strokeWidth"
    [strokeStyle]="strokeStyle"
    [strokeSides]="strokeSides"
    [strokeWidths]="strokeWidths"
    [borderStyleOptions]="borderStyleOptions"
    [backgroundImage]="backgroundImage"
    [backgroundSize]="backgroundSize"
    [backgroundPosition]="backgroundPosition"
    [backgroundRepeat]="backgroundRepeat"
    [objectFit]="objectFit"
    [imageAltText]="imageAltText"
    [initialColorMode]="initialColorMode"
    [effectTemplate]="effectSlot"
    (patchRequested)="patchRequested.emit($event)"
    (numberGestureStarted)="numberGestureStarted.emit()"
    (numberGestureCommitted)="numberGestureCommitted.emit()">
  </app-dropdown-menu>
</ng-container>

<ng-template #overlayMode>
  <ng-container *ngIf="showAddButton; else triggerField">
    <button type="button" class="field-input__add-btn" (click)="onTriggerClick($event)">Add...</button>
  </ng-container>

  <ng-template #triggerField>
    <div class="field-input__trigger field-input__trigger--color" [class.is-active]="isOpen">
      <button #triggerButton type="button" class="field-input__trigger-main" (click)="onTriggerClick($event)">
        <ng-container [ngSwitch]="kind">
          <span
            *ngSwitchCase="'fill'"
            class="field-input__color-swatch"
            [class.field-input__color-swatch--transparent]="isTransparent"
            [style.background]="isTransparent ? null : swatchColor">
          </span>
          <span
            *ngSwitchCase="'stroke'"
            class="field-input__color-swatch"
            [style.background]="swatchColor">
          </span>
          <span
            *ngSwitchCase="'shadow'"
            class="field-input__color-swatch"
            [class.field-input__color-swatch--transparent]="isShadowSwatchTransparent"
            [style.background]="isShadowSwatchTransparent ? null : shadowSwatchColor"></span>
          <span *ngSwitchCase="'effect'" class="field-input__effect-swatch" aria-hidden="true">
            <svg viewBox="0 0 16 16" class="field-input__effect-swatch-icon" fill="none">
              <path d="M8 1.8L9.36 5.14L12.7 6.5L9.36 7.86L8 11.2L6.64 7.86L3.3 6.5L6.64 5.14L8 1.8Z" fill="currentColor" />
              <path d="M12.5 9.2L13.12 10.88L14.8 11.5L13.12 12.12L12.5 13.8L11.88 12.12L10.2 11.5L11.88 10.88L12.5 9.2Z" fill="currentColor" opacity="0.86" />
            </svg>
          </span>
        </ng-container>
        <span class="field-input__trigger-text">{{ triggerText }}</span>
      </button>
      <button
        *ngIf="showClearButton"
        type="button"
        class="field-input__trigger-clear"
        [title]="clearButtonTitle"
        [attr.aria-label]="clearButtonTitle"
        (click)="onClearClick($event)">×</button>
    </div>
  </ng-template>

  <div
    #popupPanel
    class="field-input__popup"
    popover="manual"
    [style.top.px]="popupTop"
    [style.bottom.px]="popupBottom"
    [style.left.px]="popupLeft"
    [style.width.px]="popupWidth"
    (pointerdown)="$event.stopPropagation()">
    <div class="field-input__popup-header">
      <p class="field-input__popup-title">{{ popupTitle }}</p>
      <button type="button" class="field-input__popup-close" (click)="onPopupCloseClick()">×</button>
    </div>
    <app-dropdown-menu
      [kind]="kind"
      [projectId]="projectId"
      [colorValue]="colorValue"
      [pickerColor]="pickerColor"
      [isTransparent]="isTransparent"
      [shadowValue]="shadowValue"
      [strokeWidth]="strokeWidth"
      [strokeStyle]="strokeStyle"
      [strokeSides]="strokeSides"
      [strokeWidths]="strokeWidths"
      [borderStyleOptions]="borderStyleOptions"
      [backgroundImage]="backgroundImage"
      [backgroundSize]="backgroundSize"
      [backgroundPosition]="backgroundPosition"
      [backgroundRepeat]="backgroundRepeat"
      [objectFit]="objectFit"
      [imageAltText]="imageAltText"
      [initialColorMode]="initialColorMode"
      [effectTemplate]="effectSlot"
      (patchRequested)="patchRequested.emit($event)"
      (numberGestureStarted)="numberGestureStarted.emit()"
      (numberGestureCommitted)="numberGestureCommitted.emit()">
    </app-dropdown-menu>
  </div>
</ng-template>
