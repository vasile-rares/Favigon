<ng-container *ngIf="showAddButton; else triggerField">
  <button type="button" class="style-popup-field__add-btn" (click)="onTriggerClick($event)">Add...</button>
</ng-container>

<ng-template #triggerField>
  <div class="style-popup-field__trigger" [class.is-active]="isOpen" [class.style-popup-field__trigger--color]="kind !== 'shadow'">
    <button type="button" class="style-popup-field__trigger-main" (click)="onTriggerClick($event)">
      <ng-container [ngSwitch]="kind">
        <span
          *ngSwitchCase="'fill'"
          class="style-popup-field__color-swatch"
          [class.style-popup-field__color-swatch--transparent]="isTransparent"
          [style.background]="isTransparent ? null : swatchColor">
        </span>
        <span
          *ngSwitchCase="'stroke'"
          class="style-popup-field__color-swatch"
          [style.background]="swatchColor">
        </span>
        <span *ngSwitchCase="'shadow'" class="style-popup-field__shadow-preview style-popup-field__shadow-preview--{{ shadowPreview }}"></span>
      </ng-container>
      <span class="style-popup-field__trigger-text">{{ triggerText }}</span>
    </button>
    <button
      *ngIf="showClearButton"
      type="button"
      class="style-popup-field__trigger-clear"
      [title]="clearButtonTitle"
      [attr.aria-label]="clearButtonTitle"
      (click)="onClearClick($event)">×</button>
  </div>
</ng-template>

<app-style-popup-overlay
  *ngIf="isOpen"
  [open]="isOpen"
  [top]="popupTop"
  [bottom]="popupBottom"
  [left]="popupLeft"
  [width]="popupWidth"
  [title]="popupTitle"
  (closeRequested)="onPopupCloseClick()">
  <ng-container [ngSwitch]="kind">
    <div class="style-popup-field__popup-section" *ngSwitchCase="'fill'">
      <div class="style-popup-field__color-picker">
        <div
          class="style-popup-field__color-picker-surface"
          [style.background-color]="pickerHueColor()"
          (pointerdown)="onColorSurfacePointerDown($event)">
          <div
            class="style-popup-field__color-picker-surface-handle"
            [style.left.%]="pickerSaturationPercent()"
            [style.top.%]="pickerValuePercent()">
          </div>
        </div>

        <div class="style-popup-field__color-picker-footer">
          <div class="style-popup-field__color-picker-preview" [class.style-popup-field__color-picker-preview--transparent]="pickerAlpha <= 0.001" [style.background]="pickerColorValue()"></div>
          <div class="style-popup-field__color-picker-hue">
            <div class="style-popup-field__color-picker-hue-track" (pointerdown)="onHueSliderPointerDown($event)">
              <div class="style-popup-field__color-picker-hue-handle" [style.left.%]="pickerHuePercent()"></div>
            </div>
            <div class="style-popup-field__color-picker-alpha-track" (pointerdown)="onAlphaSliderPointerDown($event)">
              <div class="style-popup-field__color-picker-alpha-fill" [style.background]="alphaTrackBackground()"></div>
              <div class="style-popup-field__color-picker-alpha-handle" [style.left.%]="pickerAlphaPercent()"></div>
            </div>
          </div>
        </div>
      </div>

      <label class="style-popup-field__popup-field-label">Color</label>
      <div class="style-popup-field__popup-text-input-shell">
        <input class="style-popup-field__popup-text-input" type="text" [value]="pickerColorValue()" (change)="onColorTextChange($event)" />
      </div>
    </div>

    <div class="style-popup-field__popup-section" *ngSwitchCase="'stroke'">
      <div class="style-popup-field__color-picker">
        <div
          class="style-popup-field__color-picker-surface"
          [style.background-color]="pickerHueColor()"
          (pointerdown)="onColorSurfacePointerDown($event)">
          <div
            class="style-popup-field__color-picker-surface-handle"
            [style.left.%]="pickerSaturationPercent()"
            [style.top.%]="pickerValuePercent()">
          </div>
        </div>

        <div class="style-popup-field__color-picker-footer">
          <div class="style-popup-field__color-picker-preview" [class.style-popup-field__color-picker-preview--transparent]="pickerAlpha <= 0.001" [style.background]="pickerColorValue()"></div>
          <div class="style-popup-field__color-picker-hue">
            <div class="style-popup-field__color-picker-hue-track" (pointerdown)="onHueSliderPointerDown($event)">
              <div class="style-popup-field__color-picker-hue-handle" [style.left.%]="pickerHuePercent()"></div>
            </div>
            <div class="style-popup-field__color-picker-alpha-track" (pointerdown)="onAlphaSliderPointerDown($event)">
              <div class="style-popup-field__color-picker-alpha-fill" [style.background]="alphaTrackBackground()"></div>
              <div class="style-popup-field__color-picker-alpha-handle" [style.left.%]="pickerAlphaPercent()"></div>
            </div>
          </div>
        </div>
      </div>

      <label class="style-popup-field__popup-field-label">Color</label>
      <div class="style-popup-field__popup-text-input-shell">
        <input class="style-popup-field__popup-text-input" type="text" [value]="pickerColorValue()" (change)="onColorTextChange($event)" />
      </div>

      <div class="style-popup-field__popup-grid">
        <div>
          <label class="style-popup-field__popup-field-label">Weight</label>
          <app-number-input
            appearance="popup"
            ariaLabel="Stroke width"
            [value]="strokeWidth"
            [min]="0"
            [step]="1"
            (gestureStarted)="onNumberGestureStarted()"
            (gestureCommitted)="onNumberGestureCommitted()"
            (valueChange)="onStrokeWidthChange($event)" />
        </div>
        <div>
          <label class="style-popup-field__popup-field-label">Style</label>
          <app-dropdown-select
            class="style-popup-field__popup-dropdown"
            [enableSearch]="false"
            [placeholder]="'Select style'"
            [options]="strokeStyleDropdownOptions"
            [ngModel]="selectedStrokeStyleOption"
            (ngModelChange)="onStrokeStyleValueChange($event)"></app-dropdown-select>
        </div>
      </div>
    </div>

    <div class="style-popup-field__popup-section" *ngSwitchCase="'shadow'">
      <div class="style-popup-field__shadow-list">
        <button
          type="button"
          class="style-popup-field__shadow-option"
          *ngFor="let option of shadowOptions"
          [class.active]="shadowPreview === option"
          (click)="onShadowSelected(option)">
          <span class="style-popup-field__shadow-preview style-popup-field__shadow-preview--{{ option }}"></span>
          <span>{{ option | uppercase }}</span>
        </button>
      </div>
    </div>
  </ng-container>
</app-style-popup-overlay>
