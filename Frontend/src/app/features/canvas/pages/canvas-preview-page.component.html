<div class="preview-page" (click)="closePageMenu()">
  <header class="preview-toolbar" (click)="$event.stopPropagation()">
    <div class="preview-toolbar__left">
      <button
        *ngFor="let option of deviceOptions"
        type="button"
        class="preview-device-btn"
        [class.active]="selectedDevice() === option.id"
        (click)="selectDevice(option.id)">
        {{ option.label }}
      </button>
      <button
        type="button"
        class="preview-device-btn"
        [class.active]="selectedDevice() === 'custom'"
        (click)="selectDevice('custom')">
        Custom
      </button>
    </div>

    <div class="preview-toolbar__center">
      <button type="button" class="preview-page-switch" (click)="togglePageMenu()">
        {{ currentPage()?.name ?? 'No page' }}
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>

      @if (isPageMenuOpen()) {
        <div class="preview-page-menu">
          <button
            *ngFor="let page of pages(); trackBy: trackByPageId"
            type="button"
            class="preview-page-menu__item"
            [class.active]="page.id === currentPageId()"
            (click)="selectPage(page.id)">
            {{ page.name }}
          </button>
        </div>
      }
    </div>

    <div class="preview-toolbar__right">
      <button type="button" class="preview-refresh" (click)="refreshPreview()" aria-label="Refresh preview">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
      </button>
    </div>
  </header>

  <main class="preview-stage">
    @if (error()) {
      <p class="preview-status is-error">{{ error() }}</p>
    } @else if (isLoading()) {
      <p class="preview-status">Loading preview...</p>
    } @else if (!currentPage()) {
      <p class="preview-status">No pages available for preview.</p>
    } @else {
      <div
        class="preview-viewport"
        [style.width.px]="viewportWidth()"
        [style.height.px]="viewportHeight()"
        [attr.data-device]="selectedDevice()">
        <div
          *ngFor="let el of visibleElements(); trackBy: trackByElementId"
          class="preview-element"
          [class.frame]="el.type === 'frame'"
          [class.text]="el.type === 'text'"
          [class.image]="el.type === 'image'"
          [style.left.px]="getRenderedX(el)"
          [style.top.px]="getRenderedY(el)"
          [style.width.px]="el.width"
          [style.height.px]="el.height"
          [style.transform]="getElementTransform(el)"
          [style.background-color]="el.type !== 'text' && el.type !== 'image' ? el.fill : 'transparent'"
          [style.border]="getElementBorderStyle(el)"
          [style.box-shadow]="getElementBoxShadow(el)"
          [style.opacity]="el.opacity ?? 1"
          [style.clip-path]="getElementClipPath(el)"
          [style.border-radius.px]="el.cornerRadius ?? (el.type === 'image' ? 6 : 0)">

          <ng-container *ngIf="el.type === 'text'">
            <div
              class="preview-text"
              [style.font-size.px]="el.fontSize"
              [style.font-family]="getTextFontFamily(el)"
              [style.font-weight]="getTextFontWeight(el)"
              [style.font-style]="getTextFontStyle(el)"
              [style.line-height]="getTextLineHeight(el)"
              [style.letter-spacing]="getTextLetterSpacing(el)"
              [style.text-align]="getTextAlignValue(el)">
              <span>{{ el.text }}</span>
            </div>
          </ng-container>

          <ng-container *ngIf="el.type === 'image'">
            <img [src]="el.imageUrl" alt="Preview image" draggable="false" />
          </ng-container>
        </div>
      </div>
    }
  </main>
</div>
