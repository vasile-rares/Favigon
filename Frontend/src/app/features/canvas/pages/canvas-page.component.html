<div class="canvas-layout">
  <app-header-bar></app-header-bar>

  <div class="workspace">
    <app-project-panel
      [pages]="pages()"
      [currentPageId]="currentPageId()"
      [focusedPageId]="layersFocusedPageId()"
      [elements]="elements()"
      [selectedElementId]="selectedElementId()"
      (pageSelected)="selectPage($event)"
      (pageCreateRequested)="addPage()"
      (pageDeleteRequested)="deletePage($event)"
      (layerSelected)="onLayerSelected($event)"
      (layerNameChanged)="onLayerNameChanged($event)"
      (layerMoved)="onLayerMoved($event)"
      (layerVisibilityToggled)="onLayerVisibilityToggled($event)"
      (layerContextMenuRequested)="onLayerContextMenuRequested($event)"
      (pageNameChanged)="onPageNameChanged($event)"></app-project-panel>

    <app-toolbar
      [activeTool]="currentTool()"
      [zoomLevel]="zoomPercentage()"
      (toolSelected)="onToolbarToolSelected($event)"
      (zoomInRequested)="zoomIn()"
      (zoomOutRequested)="zoomOut()"
      (zoomResetRequested)="resetZoom()"></app-toolbar>

    <main
      class="canvas-container"
      [class.pan-ready]="isPanReady()"
      [class.panning]="viewport.isPanning()"
      [style.--dot-size]="canvasBackgroundSize()"
      [style.--dot-pos]="canvasBackgroundPosition()"
      (pointerdown)="onCanvasPointerDown($event)"
      (click)="onCanvasClick($event)"
      (wheel)="onCanvasWheel($event)"
      (contextmenu)="onCanvasContextMenu($event)">
      <div class="canvas-viewport" [style.transform]="canvasViewportTransform()">
        <div class="canvas-scene" [style.transform]="canvasSceneTransform()">
          <ng-container *ngFor="let layout of inactivePageLayouts()">
            <div
              class="page-shell page-shell--inactive"
              [style.left.px]="getPageShellLeft(layout.pageId)"
              [style.top.px]="getPageShellTop(layout.pageId)"
              [style.width.px]="getPageShellWidth(layout.pageId)"
              [style.height.px]="getPageShellHeight(layout.pageId)"
              [style.border-radius.px]="getShellBorderRadius()"
              [style.border-width.px]="getShellBorderWidth()"
              (pointerdown)="onPageShellPointerDown($event, layout.pageId)"
              (click)="onInactivePageShellClick(layout.pageId)">
            </div>

            <div
              *ngFor="let pageElement of getVisibleElementsForPage(layout.pageId); trackBy: trackByElementId"
              class="canvas-element canvas-element-preview"
              [class.frame]="pageElement.type === 'frame'"
              [class.rectangle]="pageElement.type === 'rectangle'"
              [class.circle]="pageElement.type === 'circle'"
              [class.text]="pageElement.type === 'text'"
              [class.image]="pageElement.type === 'image'"
              [style.left.px]="getRenderedXForPage(pageElement, layout.pageId)"
              [style.top.px]="getRenderedYForPage(pageElement, layout.pageId)"
              [style.width.px]="pageElement.width"
              [style.height.px]="pageElement.height"
              [style.transform]="getElementTransform(pageElement)"
              [style.background-color]="pageElement.type !== 'text' && pageElement.type !== 'image' ? pageElement.fill : 'transparent'"
              [style.color]="pageElement.type === 'text' ? pageElement.fill : null"
              [style.border]="getElementBorderStyle(pageElement)"
              [style.opacity]="pageElement.opacity ?? 1"
              [style.clip-path]="getElementClipPathForPage(pageElement, layout.pageId)"
              [style.visibility]="isElementClippedOutForPage(pageElement, layout.pageId) ? 'hidden' : 'visible'"
              [style.border-radius.px]="pageElement.type === 'circle' ? null : (pageElement.cornerRadius ?? (pageElement.type === 'image' ? 6 : 0))">

              <ng-container *ngIf="pageElement.type === 'text'">
                <div
                  class="text-content"
                  [style.font-size.px]="pageElement.fontSize"
                  [style.font-family]="getTextFontFamily(pageElement)"
                  [style.font-weight]="getTextFontWeight(pageElement)"
                  [style.font-style]="getTextFontStyle(pageElement)"
                  [style.line-height]="getTextLineHeight(pageElement)"
                  [style.letter-spacing]="getTextLetterSpacing(pageElement)"
                  [style.text-align]="getTextAlignValue(pageElement)">
                  <span>{{ pageElement.text }}</span>
                </div>
              </ng-container>

              <ng-container *ngIf="pageElement.type === 'image'">
                <img [src]="pageElement.imageUrl" alt="Canvas image" draggable="false" />
              </ng-container>
            </div>
          </ng-container>

          <ng-container *ngIf="activePageLayout() as activeLayout">
            <div
              class="page-shell page-shell--active"
              [style.left.px]="getPageShellLeft(activeLayout.pageId)"
              [style.top.px]="getPageShellTop(activeLayout.pageId)"
              [style.width.px]="getPageShellWidth(activeLayout.pageId)"
              [style.height.px]="getPageShellHeight(activeLayout.pageId)"
              [style.border-radius.px]="getShellBorderRadius()"
              [style.border-width.px]="getShellBorderWidth()"
              (pointerdown)="onPageShellPointerDown($event, activeLayout.pageId)"
              (click)="onActivePageShellClick(activeLayout.pageId)"></div>

          </ng-container>

          <div
            *ngFor="let el of visibleElements(); trackBy: trackByElementId"
            class="canvas-element"
            [class.selected]="selectedElementId() === el.id"
            [class.editing]="isTextEditing(el.id)"
            [class.has-text]="el.type === 'text' && !!el.text"
            [class.frame]="el.type === 'frame'"
            [class.frame-hovered]="el.type === 'frame' && hoveredElementId() === el.id && !isDraggingEl()"
            [class.frame-selected-body]="el.type === 'frame' && selectedElementId() === el.id"
            [class.frame-reorder-animating]="isRootFrame(el) && isFrameReorderAnimating() && selectedElementId() !== el.id"
            [class.frame-reorder-live]="isRootFrame(el) && isDraggingEl() && selectedElementId() !== el.id"
            [class.rectangle]="el.type === 'rectangle'"
            [class.circle]="el.type === 'circle'"
            [class.text]="el.type === 'text'"
            [class.image]="el.type === 'image'"
            [style.left.px]="getRenderedX(el)"
            [style.top.px]="getRenderedY(el)"
            [style.width.px]="el.width"
            [style.height.px]="el.height"
            [style.transform]="getElementTransform(el)"
            [style.background-color]="el.type !== 'text' && el.type !== 'image' ? el.fill : 'transparent'"
            [style.color]="el.type === 'text' ? el.fill : null"
            [style.border]="getElementBorderStyle(el)"
            [style.outline]="getElementOutlineStyle(el)"
            [style.outline-offset.px]="getElementOutlineOffset(el)"
            [style.opacity]="el.opacity ?? 1"
            [style.clip-path]="getElementClipPath(el)"
            [style.visibility]="isElementClippedOut(el) ? 'hidden' : 'visible'"
            [style.border-radius.px]="el.type === 'circle' ? null : (el.cornerRadius ?? (el.type === 'image' ? 6 : 0))"
            (pointerdown)="onElementPointerDown($event, el.id)"
            (pointerenter)="hoveredElementId.set(el.id)"
            (pointerleave)="hoveredElementId.set(null)"
            (dblclick)="onElementDoubleClick($event, el.id)"
            (contextmenu)="onElementContextMenu($event, el.id)">

            <div
              class="frame-title"
              *ngIf="el.type === 'frame' && !isFrameTitleHiddenByHeader(el)"
              [class.frame-title-hovered]="hoveredFrameTitleId() === el.id && !isDraggingEl()"
              [class.frame-title-selected]="selectedElementId() === el.id"
              [style.top.px]="getFrameTitleOffset()"
              [style.font-size.px]="getFrameTitleFontSize()"
              (pointerenter)="hoveredFrameTitleId.set(el.id)"
              (pointerleave)="hoveredFrameTitleId.set(null)"
              (pointerdown)="onFrameTitlePointerDown($event, el.id)">
              <span class="frame-title-text">{{ getFrameTitle(el) }}</span>
            </div>

            <ng-container *ngIf="el.type === 'text'">
              <ng-container *ngIf="!isTextEditing(el.id); else textEditor">
                <div
                  class="text-content"
                  [style.font-size.px]="el.fontSize"
                  [style.font-family]="getTextFontFamily(el)"
                  [style.font-weight]="getTextFontWeight(el)"
                  [style.font-style]="getTextFontStyle(el)"
                  [style.line-height]="getTextLineHeight(el)"
                  [style.letter-spacing]="getTextLetterSpacing(el)"
                  [style.text-align]="getTextAlignValue(el)">
                  <span>{{ el.text }}</span>
                </div>
              </ng-container>

              <ng-template #textEditor>
                <textarea
                  class="text-inline-editor"
                  [attr.data-text-editor-id]="el.id"
                  [value]="el.text || ''"
                  [style.font-size.px]="el.fontSize"
                  [style.font-family]="getTextFontFamily(el)"
                  [style.font-weight]="getTextFontWeight(el)"
                  [style.font-style]="getTextFontStyle(el)"
                  [style.line-height]="getTextLineHeight(el)"
                  [style.letter-spacing]="getTextLetterSpacing(el)"
                  [style.text-align]="getTextAlignValue(el)"
                  (pointerdown)="onTextEditorPointerDown($event)"
                  (input)="onTextEditorInput(el.id, $event)"
                  (blur)="onTextEditorBlur(el.id)"
                  (keydown)="onTextEditorKeyDown($event, el.id)"></textarea>
              </ng-template>
            </ng-container>

            <ng-container *ngIf="el.type === 'image'">
              <img [src]="el.imageUrl" alt="Canvas image" draggable="false" />
            </ng-container>

          </div>

          <ng-container *ngFor="let line of snapLines()">
            <div
              *ngIf="line.type === 'vertical'"
              class="snap-line snap-line-v"
              [style.left.px]="getSnapLineX(line.position)"></div>
            <div
              *ngIf="line.type === 'horizontal'"
              class="snap-line snap-line-h"
              [style.top.px]="getSnapLineY(line.position)"></div>
          </ng-container>

        </div>

        <div class="page-shell-toolbar-layer">
          <ng-container *ngFor="let layout of pageLayouts()">
            <div
              class="page-shell-header"
              [class.page-shell-header--active]="layout.pageId === currentPageId()"
              [class.page-shell-header--inactive]="layout.pageId !== currentPageId()"
              [style.left.px]="getPageShellHeaderScreenLeft(layout.pageId)"
              [style.top.px]="getPageShellHeaderScreenTop(layout.pageId)"
              [style.width.px]="getPageShellHeaderScreenWidth(layout.pageId)"
              (click)="$event.stopPropagation()">
              <div class="page-shell-header-content">
                <div class="page-shell-header-left">
                  <button
                    type="button"
                    class="page-run-preview"
                    (click)="openPreviewForPage(layout.pageId); $event.stopPropagation()"
                    aria-label="Run preview">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                  </button>
                  <span
                    class="page-name-readonly"
                    (pointerdown)="onPageNamePointerDown($event, layout.pageId)">
                    {{ getPageById(layout.pageId)?.name }}
                  </span>
                </div>

                <div class="page-device-add">
                  <button
                    type="button"
                    class="page-device-add-btn"
                    aria-label="Add device frame"
                    (click)="openDeviceFrameMenu($event, layout.pageId)">
                    +
                  </button>
                </div>
              </div>
            </div>
          </ng-container>
        </div>

        <!-- Page shell selection outline (no resize handles) -->
        <div
          *ngIf="layersFocusedPageId() && !selectedElementId() && !isDraggingEl()"
          class="page-shell-selection-outline"
          [style.left.px]="getPageShellSelectionLeft(layersFocusedPageId()!)"
          [style.top.px]="getPageShellSelectionTop(layersFocusedPageId()!)"
          [style.width.px]="getPageShellSelectionWidth(layersFocusedPageId()!)"
          [style.height.px]="getPageShellSelectionHeight(layersFocusedPageId()!)"></div>

        <!-- Selection UI overlay — lives in .canvas-viewport (pans with content)
             but NOT in .canvas-scene, so no scale() transform applies.
             Handles use fixed integer pixel sizes: no sub-pixel squishing. -->
        <ng-container *ngIf="!isDraggingEl()">

          <!-- Hover outline (visual only, no pointer events) -->
          <ng-container *ngFor="let el of visibleElements(); trackBy: trackByElementId">
            <div
              *ngIf="hoveredElementId() === el.id && el.type !== 'frame' && !isTextEditing(el.id)"
              class="overlay-hover-outline"
              [class.is-circle]="el.type === 'circle'"
              [style.left.px]="getSelectionLeft(el)"
              [style.top.px]="getSelectionTop(el)"
              [style.width.px]="getSelectionWidth(el)"
              [style.height.px]="getSelectionHeight(el)"
              [style.transform]="getElementTransform(el)">
            </div>
          </ng-container>

          <!-- Selection outline + handles -->
          <ng-container *ngIf="getSelectionOverlayElement() as sel">
            <div
              class="selection-outline"
              [class.is-circle]="sel.type === 'circle'"
              [style.left.px]="getSelectionLeft(sel)"
              [style.top.px]="getSelectionTop(sel)"
              [style.width.px]="getSelectionWidth(sel)"
              [style.height.px]="getSelectionHeight(sel)"
              [style.transform]="getElementTransform(sel)"
              (pointerdown)="onSelectionOutlinePointerDown($event, sel.id)"
              (dblclick)="onElementDoubleClick($event, sel.id)"
              (contextmenu)="onElementContextMenu($event, sel.id)">

              <div class="edge-hit edge-hit-n" (pointerdown)="onResizeHandlePointerDown($event, sel.id, 'n')"></div>
              <div class="edge-hit edge-hit-s" (pointerdown)="onResizeHandlePointerDown($event, sel.id, 's')"></div>
              <div class="edge-hit edge-hit-e" (pointerdown)="onResizeHandlePointerDown($event, sel.id, 'e')"></div>
              <div class="edge-hit edge-hit-w" (pointerdown)="onResizeHandlePointerDown($event, sel.id, 'w')"></div>

              <button
                *ngIf="supportsCornerRadius(sel)"
                type="button"
                class="corner-radius-handle"
                [style.top.px]="getOverlayCornerRadiusInset(sel)"
                [style.right.px]="getOverlayCornerRadiusInset(sel)"
                (pointerdown)="onCornerRadiusHandlePointerDown($event, sel.id)"
                aria-label="Adjust corner radius"></button>

              <div
                *ngFor="let corner of cornerHandles"
                class="corner-zone"
                [ngClass]="cornerZoneClass(corner)"
                (pointerdown)="onCornerZonePointerDown($event, sel.id, corner)">
                <button
                  type="button"
                  class="handle"
                  [ngClass]="handleClass(corner)"
                  (pointerdown)="onResizeHandlePointerDown($event, sel.id, corner)"
                  aria-label="Resize element"></button>
              </div>
            </div>
          </ng-container>

        </ng-container>
      </div>
    </main>

    <app-properties-panel
      [selectedElement]="selectedElement()"
      [currentTool]="currentTool()"
      [selectedFramework]="selectedFramework()"
      [validationResult]="validationResult()"
      [apiError]="apiError()"
      [isValidating]="isValidating()"
      [isGenerating]="isGenerating()"
      [generatedHtml]="generatedHtml()"
      [generatedCss]="generatedCss()"
      [irPreview]="irPreview()"
      (frameworkChanged)="setFramework($event)"
      (validateRequested)="validateIR()"
      (generateRequested)="generateCode()"
      (frameTemplateSelected)="onFrameTemplateSelected($event)"
      (elementPatch)="onSelectedElementPatch($event)"></app-properties-panel>
  </div>
</div>

@if (contextMenu.isOpen()) {
  <app-context-menu
    [x]="contextMenu.positionX()"
    [y]="contextMenu.positionY()"
    [items]="contextMenu.items()"
    (closed)="closeContextMenu()"></app-context-menu>
}

@if (isDeviceMenuOpen()) {
  <app-context-menu
    [x]="deviceMenuX()"
    [y]="deviceMenuY()"
    [items]="deviceMenuItems()"
    (closed)="closeDeviceFrameMenu()"></app-context-menu>
}

@if (isCustomFrameDialogOpen()) {
  <app-dialog-box
    title="Custom Frame"
    description="Set custom width and height for the new frame."
    [fields]="customFrameDialogFields()"
    [primaryAction]="{ label: 'Add Frame', variant: 'primary' }"
    [secondaryAction]="{ label: 'Cancel', variant: 'outline' }"
    (primaryClicked)="onCustomFrameDialogPrimary($event)"
    (secondaryClicked)="closeCustomFrameDialog()"
    (closed)="closeCustomFrameDialog()"></app-dialog-box>
}
