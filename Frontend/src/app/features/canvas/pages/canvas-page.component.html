<div class="canvas-layout">
  <app-header-bar class="canvas-header" appearance="canvas"></app-header-bar>

  <div class="workspace">
    <app-project-panel
      [pages]="pages()"
      [currentPageId]="currentPageId()"
      [focusedPageId]="page.layersFocusedPageId()"
      [selectedPageLayerId]="page.selectedPageLayerId()"
      [canPastePage]="page.hasCopiedPage()"
      [elements]="elements()"
      [selectedElementId]="selectedElementId()"
      [selectedElementIds]="selectedElementIds()"
      (pageSelected)="page.selectPage($event)"
      (pageLayerSelected)="page.selectPageWithoutFocus($event)"
      (pageCreateRequested)="page.addPage()"
      (pageCopyRequested)="page.copyPage($event)"
      (pagePasteRequested)="page.pastePage($event)"
      (pageDuplicateRequested)="page.duplicatePage($event)"
      (pageDeleteRequested)="page.deletePage($event)"
      (layerSelected)="onLayerSelected($event)"
      (layerNameChanged)="onLayerNameChanged($event)"
      (layerMoved)="onLayerMoved($event)"
      (layerVisibilityToggled)="onLayerVisibilityToggled($event)"
      (layerContextMenuRequested)="onLayerContextMenuRequested($event)"
      (pageNameChanged)="page.onPageNameChanged($event)"></app-project-panel>

    <app-toolbar
      [activeTool]="currentTool()"
      [zoomLevel]="zoomPercentage()"
      (toolSelected)="onToolbarToolSelected($event)"
      (zoomInRequested)="zoomIn()"
      (zoomOutRequested)="zoomOut()"
      (zoomResetRequested)="resetZoom()"></app-toolbar>

    <main
      class="canvas-container"
      [class.pan-ready]="isPanReady()"
      [class.panning]="viewport.isPanning()"
      (pointerdown)="onCanvasPointerDown($event)"
      (click)="onCanvasClick($event)"
      (wheel)="onCanvasWheel($event)"
      (contextmenu)="onCanvasContextMenu($event)">
      <!-- PixiJS canvas is mounted into .canvas-container by CanvasPixiApplicationService -->

      <!-- Page name inline editor — appears when user double-clicks a page name in PixiJS -->
      @if (page.editingCanvasHeaderPageId(); as editingPageId) {
        <input
          class="page-name-editor"
          type="text"
          [attr.data-canvas-page-name-id]="editingPageId"
          [value]="page.editingCanvasHeaderPageName()"
          [style.left.px]="getPageNameEditorLeft(editingPageId)"
          [style.top.px]="getPageNameEditorTop(editingPageId)"
          [style.width.px]="getPageNameEditorWidth(editingPageId)"
          (input)="page.onCanvasHeaderPageNameInput($event)"
          (blur)="page.onCanvasHeaderPageNameBlur(editingPageId)"
          (keydown)="page.onCanvasHeaderPageNameKeyDown(editingPageId, $event)"
          (pointerdown)="$event.stopPropagation()"
          (dblclick)="$event.stopPropagation()" />
      }

      <!-- Inline text editor overlay — positioned absolutely over the PixiJS canvas -->
      @if (getTextEditorElement(); as editEl) {
        <div
          class="text-inline-editor"
          [attr.data-text-editor-id]="editEl.id"
          contenteditable="true"
          spellcheck="false"
          role="textbox"
          aria-multiline="true"
          [style.left.px]="getTextEditorScreenLeft()"
          [style.top.px]="getTextEditorScreenTop()"
          [style.width.px]="getTextEditorScreenWidth()"
          [style.height.px]="getTextEditorScreenHeight()"
          [style.font-size]="getTextFontSize(editEl)"
          [style.font-family]="getTextFontFamily(editEl)"
          [style.font-weight]="getTextFontWeight(editEl)"
          [style.font-style]="getTextFontStyle(editEl)"
          [style.line-height]="getTextLineHeight(editEl)"
          [style.letter-spacing]="getTextLetterSpacing(editEl)"
          [style.text-align]="getTextAlignValue(editEl)"
          [style.color]="editEl.fill"
          [style.transform]="'scale(' + viewport.zoomLevel() + ')'"
          [style.transform-origin]="'0 0'"
          (pointerdown)="onTextEditorPointerDown($event)"
          (input)="onTextEditorInput(editEl.id, $event)"
          (blur)="onTextEditorBlur(editEl.id)"
            (keydown)="onTextEditorKeyDown($event, editEl.id)"></div>
      }
    </main>

    <app-properties-panel
      [selectedElement]="selectedElement()"
      [pages]="pages()"
      [currentPageId]="currentPageId()"
      [currentTool]="currentTool()"
      [selectedFramework]="gen.selectedFramework()"
      [validationResult]="gen.validationResult()"
      [apiError]="apiError() || gen.error()"
      [isValidating]="gen.isValidating()"
      [isGenerating]="gen.isGenerating()"
      [generatedHtml]="gen.generatedHtml()"
      [generatedCss]="gen.generatedCss()"
      [irPreview]="irPreview()"
      (frameworkChanged)="setFramework($event)"
      (validateRequested)="validateIR()"
      (generateRequested)="generateCode()"
      (frameTemplateSelected)="onFrameTemplateSelected($event)"
      (numberInputGestureStarted)="onPropertyNumberGestureStarted()"
      (numberInputGestureCommitted)="onPropertyNumberGestureCommitted()"
      (elementPatch)="onSelectedElementPatch($event)"></app-properties-panel>
  </div>
</div>

@if (contextMenu.isOpen()) {
  <app-context-menu
    [x]="contextMenu.positionX()"
    [y]="contextMenu.positionY()"
    [items]="contextMenu.items()"
    (closed)="closeContextMenu()"></app-context-menu>
}

@if (page.isDeviceMenuOpen()) {
  <app-context-menu
    [x]="page.deviceMenuX()"
    [y]="page.deviceMenuY()"
    [items]="page.deviceMenuItems()"
    (closed)="page.closeDeviceFrameMenu()"></app-context-menu>
}

@if (page.isCustomFrameDialogOpen()) {
  <app-dialog-box
    title="Custom Frame"
    description="Set custom width and height for the new frame."
    [fields]="page.customFrameDialogFields()"
    [primaryAction]="{ label: 'Add Frame', variant: 'primary' }"
    [secondaryAction]="{ label: 'Cancel', variant: 'outline' }"
    (primaryClicked)="page.onCustomFrameDialogPrimary($event)"
    (secondaryClicked)="page.closeCustomFrameDialog()"
    (closed)="page.closeCustomFrameDialog()"></app-dialog-box>
}
