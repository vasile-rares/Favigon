<div class="canvas-layout">
  <app-header-bar class="canvas-header" appearance="canvas"></app-header-bar>

  <div class="workspace">
    <app-project-panel
      [pages]="pages()"
      [currentPageId]="currentPageId()"
      [focusedPageId]="page.layersFocusedPageId()"
      [selectedPageLayerId]="page.selectedPageLayerId()"
      [canPastePage]="page.hasCopiedPage()"
      [elements]="elements()"
      [selectedElementId]="selectedElementId()"
      [selectedElementIds]="selectedElementIds()"
      (pageSelected)="page.selectPage($event)"
      (pageLayerSelected)="page.selectPageWithoutFocus($event)"
      (pageCreateRequested)="page.addPage()"
      (pageCopyRequested)="page.copyPage($event)"
      (pagePasteRequested)="page.pastePage($event)"
      (pageDuplicateRequested)="page.duplicatePage($event)"
      (pageDeleteRequested)="page.deletePage($event)"
      (layerSelected)="onLayerSelected($event)"
      (layerNameChanged)="onLayerNameChanged($event)"
      (layerMoved)="onLayerMoved($event)"
      (layerVisibilityToggled)="onLayerVisibilityToggled($event)"
      (layerContextMenuRequested)="onLayerContextMenuRequested($event)"
      (pageNameChanged)="page.onPageNameChanged($event)"></app-project-panel>

    <app-toolbar
      [activeTool]="currentTool()"
      [zoomLevel]="zoomPercentage()"
      (toolSelected)="onToolbarToolSelected($event)"
      (zoomInRequested)="zoomIn()"
      (zoomOutRequested)="zoomOut()"
      (zoomResetRequested)="resetZoom()"></app-toolbar>

    <main
      class="canvas-container"
      [class.pan-ready]="isPanReady()"
      [class.panning]="viewport.isPanning()"
      [style.--dot-size]="canvasBackgroundSize()"
      [style.--dot-pos]="canvasBackgroundPosition()"
      (pointerdown)="onCanvasPointerDown($event)"
      (click)="onCanvasClick($event)"
      (wheel)="onCanvasWheel($event)"
      (contextmenu)="onCanvasContextMenu($event)">
      <div class="canvas-viewport" [style.transform]="canvasViewportTransform()">
        <div class="canvas-scene" #canvasScene [style.transform]="canvasSceneTransform()">
          <ng-template
            #previewElementTpl
            let-previewEl="element"
            let-previewPageId="pageId"
            let-isNested="isNested">
            <div
              class="canvas-element canvas-element-preview"
              [class.layout-child]="isNested"
              [class.flow-child]="isNested && isChildInFlow(previewEl)"
              [class.has-independent-stroke-surface]="usesIndependentStrokeSurface(previewEl)"
              [class.frame]="previewEl.type === 'frame'"
              [class.rectangle]="previewEl.type === 'rectangle'"
              [class.text]="previewEl.type === 'text'"
              [class.image]="previewEl.type === 'image'"
              [class.layout-container]="isLayoutContainer(previewEl)"
              [style.--canvas-element-surface-border]="getElementSurfaceBorderStyle(previewEl)"
              [style.left.px]="isNested ? pageLayout.getPreviewNestedX(previewEl) : pageLayout.getRenderedXForPage(previewEl, previewPageId, page.pageLayouts())"
              [style.top.px]="isNested ? pageLayout.getPreviewNestedY(previewEl) : pageLayout.getRenderedYForPage(previewEl, previewPageId, page.pageLayouts())"
              [style.width]="pageLayout.getRenderedWidthStyleForPage(previewEl, previewPageId)"
              [style.height]="pageLayout.getRenderedHeightStyleForPage(previewEl, previewPageId)"
              [style.min-width]="pageLayout.getRenderedMinWidthStyleForPage(previewEl, previewPageId)"
              [style.max-width]="pageLayout.getRenderedMaxWidthStyleForPage(previewEl, previewPageId)"
              [style.min-height]="pageLayout.getRenderedMinHeightStyleForPage(previewEl, previewPageId)"
              [style.max-height]="pageLayout.getRenderedMaxHeightStyleForPage(previewEl, previewPageId)"
              [style.transform]="getElementTransform(previewEl)"
              [style.transform-origin]="getElementTransformOrigin(previewEl)"
              [style.backface-visibility]="getElementBackfaceVisibility(previewEl)"
              [style.transform-style]="getElementTransformStyle(previewEl)"
              [style.position]="isNested ? pageLayout.getPreviewNestedPositionStyle(previewEl) : null"
              [style.display]="getElementLayoutDisplay(previewEl)"
              [style.flex-direction]="getElementLayoutFlexDirection(previewEl)"
              [style.flex-wrap]="getElementLayoutFlexWrap(previewEl)"
              [style.justify-content]="getElementLayoutJustifyContent(previewEl)"
              [style.align-items]="getElementLayoutAlignItems(previewEl)"
              [style.gap]="getElementLayoutGap(previewEl)"
              [style.grid-template-columns]="getElementLayoutGridTemplateColumns(previewEl)"
              [style.grid-template-rows]="getElementLayoutGridTemplateRows(previewEl)"
              [style.padding]="getElementLayoutPadding(previewEl)"
              [style.overflow]="getElementOverflowStyle(previewEl)"
              [style.background-color]="previewEl.type !== 'text' && previewEl.type !== 'image' ? previewEl.fill : 'transparent'"
              [style.color]="previewEl.type === 'text' ? previewEl.fill : null"
              [style.border]="getRenderedBorderStyle(previewEl)"
              [style.opacity]="previewEl.opacity ?? 1"
              [style.clip-path]="isNested ? null : pageLayout.getElementClipPathForPage(previewEl, previewPageId)"
              [style.visibility]="!isNested && pageLayout.isElementClippedOutForPage(previewEl, previewPageId) ? 'hidden' : 'visible'"
              [style.border-radius]="getElementBorderRadius(previewEl)">

              <ng-container *ngIf="previewEl.type === 'text'">
                <div
                  class="text-content"
                  [style.font-size]="getTextFontSize(previewEl)"
                  [style.font-family]="getTextFontFamily(previewEl)"
                  [style.font-weight]="getTextFontWeight(previewEl)"
                  [style.font-style]="getTextFontStyle(previewEl)"
                  [style.line-height]="getTextLineHeight(previewEl)"
                  [style.letter-spacing]="getTextLetterSpacing(previewEl)"
                  [style.text-align]="getTextAlignValue(previewEl)">
                  <span>{{ previewEl.text }}</span>
                </div>
              </ng-container>

              <ng-container *ngIf="previewEl.type === 'image'">
                <img [src]="previewEl.imageUrl" alt="Canvas image" draggable="false" />
              </ng-container>

              <ng-container *ngIf="isContainerElement(previewEl)">
                <ng-container *ngFor="let child of pageLayout.getLayoutChildrenForPage(previewEl, previewPageId); trackBy: trackByElementId">
                  <ng-container
                    *ngTemplateOutlet="previewElementTpl; context: { element: child, pageId: previewPageId, isNested: true }"></ng-container>
                </ng-container>
              </ng-container>
            </div>
          </ng-template>

          <ng-template #flowDragPreviewChildTpl let-previewChild="element">
            <div
              class="canvas-element canvas-element-preview"
              [class.layout-child]="true"
              [class.flow-child]="isChildInFlow(previewChild)"
              [class.has-independent-stroke-surface]="usesIndependentStrokeSurface(previewChild)"
              [class.frame]="previewChild.type === 'frame'"
              [class.rectangle]="previewChild.type === 'rectangle'"
              [class.text]="previewChild.type === 'text'"
              [class.image]="previewChild.type === 'image'"
              [class.layout-container]="isLayoutContainer(previewChild)"
              [style.--canvas-element-surface-border]="getElementSurfaceBorderStyle(previewChild)"
              [style.left.px]="pageLayout.getPreviewNestedX(previewChild)"
              [style.top.px]="pageLayout.getPreviewNestedY(previewChild)"
              [style.width]="getRenderedWidthStyle(previewChild)"
              [style.height]="getRenderedHeightStyle(previewChild)"
              [style.min-width]="getRenderedMinWidthStyle(previewChild)"
              [style.max-width]="getRenderedMaxWidthStyle(previewChild)"
              [style.min-height]="getRenderedMinHeightStyle(previewChild)"
              [style.max-height]="getRenderedMaxHeightStyle(previewChild)"
              [style.transform]="getElementTransform(previewChild)"
              [style.transform-origin]="getElementTransformOrigin(previewChild)"
              [style.backface-visibility]="getElementBackfaceVisibility(previewChild)"
              [style.transform-style]="getElementTransformStyle(previewChild)"
              [style.position]="pageLayout.getPreviewNestedPositionStyle(previewChild)"
              [style.display]="getElementLayoutDisplay(previewChild)"
              [style.flex-direction]="getElementLayoutFlexDirection(previewChild)"
              [style.flex-wrap]="getElementLayoutFlexWrap(previewChild)"
              [style.justify-content]="getElementLayoutJustifyContent(previewChild)"
              [style.align-items]="getElementLayoutAlignItems(previewChild)"
              [style.gap]="getElementLayoutGap(previewChild)"
              [style.grid-template-columns]="getElementLayoutGridTemplateColumns(previewChild)"
              [style.grid-template-rows]="getElementLayoutGridTemplateRows(previewChild)"
              [style.padding]="getElementLayoutPadding(previewChild)"
              [style.overflow]="getElementOverflowStyle(previewChild)"
              [style.background-color]="previewChild.type !== 'text' && previewChild.type !== 'image' ? previewChild.fill : 'transparent'"
              [style.color]="previewChild.type === 'text' ? previewChild.fill : null"
              [style.border]="getRenderedBorderStyle(previewChild)"
              [style.opacity]="previewChild.opacity ?? 1"
              [style.border-radius]="getElementBorderRadius(previewChild)">

              <ng-container *ngIf="previewChild.type === 'text'">
                <div
                  class="text-content"
                  [style.font-size]="getTextFontSize(previewChild)"
                  [style.font-family]="getTextFontFamily(previewChild)"
                  [style.font-weight]="getTextFontWeight(previewChild)"
                  [style.font-style]="getTextFontStyle(previewChild)"
                  [style.line-height]="getTextLineHeight(previewChild)"
                  [style.letter-spacing]="getTextLetterSpacing(previewChild)"
                  [style.text-align]="getTextAlignValue(previewChild)">
                  <span>{{ previewChild.text }}</span>
                </div>
              </ng-container>

              <ng-container *ngIf="previewChild.type === 'image'">
                <img [src]="previewChild.imageUrl" alt="Canvas image" draggable="false" />
              </ng-container>

              <ng-container *ngIf="isContainerElement(previewChild)">
                <ng-container *ngFor="let nestedChild of getLayoutChildren(previewChild); trackBy: trackByElementId">
                  <ng-container
                    *ngTemplateOutlet="flowDragPreviewChildTpl; context: { element: nestedChild }"></ng-container>
                </ng-container>
              </ng-container>
            </div>
          </ng-template>

          <ng-container *ngFor="let layout of page.inactivePageLayouts()">
            <div
              class="page-shell page-shell--inactive"
              [style.left.px]="pageLayout.getPageShellLeft(layout.pageId, page.pageLayouts())"
              [style.top.px]="pageLayout.getPageShellTop(layout.pageId, page.pageLayouts())"
              [style.width.px]="pageLayout.getPageShellWidth(layout.pageId, page.pageLayouts())"
              [style.height.px]="pageLayout.getPageShellHeight(layout.pageId, page.pageLayouts())"
              [style.border-radius.px]="getShellBorderRadius()"
              [style.border-width.px]="getShellBorderWidth()"
              (pointerdown)="onPageShellPointerDown($event, layout.pageId)"
              (click)="onInactivePageShellClick(layout.pageId)">
            </div>

            <ng-container *ngFor="let pageElement of pageLayout.getTopLevelVisibleElementsForPage(layout.pageId); trackBy: trackByElementId">
              <ng-container
                *ngTemplateOutlet="previewElementTpl; context: { element: pageElement, pageId: layout.pageId, isNested: false }"></ng-container>
            </ng-container>
          </ng-container>

          <ng-container *ngIf="page.activePageLayout() as activeLayout">
            <div
              class="page-shell page-shell--active"
              [style.left.px]="pageLayout.getPageShellLeft(activeLayout.pageId, page.pageLayouts())"
              [style.top.px]="pageLayout.getPageShellTop(activeLayout.pageId, page.pageLayouts())"
              [style.width.px]="pageLayout.getPageShellWidth(activeLayout.pageId, page.pageLayouts())"
              [style.height.px]="pageLayout.getPageShellHeight(activeLayout.pageId, page.pageLayouts())"
              [style.border-radius.px]="getShellBorderRadius()"
              [style.border-width.px]="getShellBorderWidth()"
              (pointerdown)="onPageShellPointerDown($event, activeLayout.pageId)"
              (click)="onActivePageShellClick(activeLayout.pageId)"></div>

            <div
              *ngIf="rectangleDrawPreview() as rectangleDraft"
              class="canvas-element canvas-element-preview canvas-element-preview--draft rectangle"
              [style.left.px]="activeLayout.x + rectangleDraft.x"
              [style.top.px]="activeLayout.y + rectangleDraft.y"
              [style.width.px]="rectangleDraft.width"
              [style.height.px]="rectangleDraft.height"></div>

          </ng-container>

          <!-- Recursive element template -->
          <ng-template #elementTpl let-el="element" let-isNested="isNested" let-isFlow="isFlow">
            <div
              class="frame-title"
              *ngIf="el.type === 'frame' && !isNested && !isFrameTitleHiddenByHeader(el)"
              [class.frame-title-hovered]="hoveredFrameTitleId() === el.id && !isDraggingEl()"
              [class.frame-title-selected]="!hasMultipleElementSelection() && isElementSelected(el.id)"
              [style.left.px]="getRenderedX(el)"
              [style.top.px]="getRenderedY(el) + getFrameTitleOffset()"
              [style.width.px]="getRenderedWidth(el)"
              [style.font-size.px]="getFrameTitleFontSize()"
              (pointerenter)="hoveredFrameTitleId.set(el.id)"
              (pointerleave)="hoveredFrameTitleId.set(null)"
              (pointerdown)="onFrameTitlePointerDown($event, el.id)">
              <span class="frame-title-text">{{ getFrameTitle(el) }}</span>
            </div>

            <div
              class="canvas-element"
              [class.layout-child]="isNested"
              [class.flow-child]="isFlow"
              [class.has-independent-stroke-surface]="usesIndependentStrokeSurface(el)"
              [class.selected]="isPartOfMultipleSelection(el.id)"
              [class.editing]="isTextEditing(el.id)"
              [class.has-text]="el.type === 'text' && !!el.text"
              [class.frame]="el.type === 'frame'"
              [class.frame-hovered]="el.type === 'frame' && hoveredElementId() === el.id && !isDraggingEl()"
              [class.frame-selected-body]="el.type === 'frame' && !hasMultipleElementSelection() && isElementSelected(el.id)"
              [class.frame-reorder-animating]="!isNested && isRootFrame(el) && isFrameReorderAnimating() && selectedElementId() !== el.id"
              [class.frame-reorder-live]="!isNested && isRootFrame(el) && isDraggingEl() && selectedElementId() !== el.id"
              [class.rectangle]="el.type === 'rectangle'"
              [class.text]="el.type === 'text'"
              [class.image]="el.type === 'image'"
              [class.layout-container]="isLayoutContainer(el)"
              [class.dragging-flow-child]="isFlowChildDragging(el)"
              [attr.data-element-id]="el.id"
              [attr.data-flow-child]="isFlow || null"
              [style.--canvas-element-surface-border]="getElementSurfaceBorderStyle(el)"
              [style.left.px]="isNested ? getNestedX(el) : getRenderedX(el)"
              [style.top.px]="isNested ? getNestedY(el) : getRenderedY(el)"
              [style.width]="getRenderedWidthStyle(el)"
              [style.height]="getRenderedHeightStyle(el)"
              [style.min-width]="getRenderedMinWidthStyle(el)"
              [style.max-width]="getRenderedMaxWidthStyle(el)"
              [style.min-height]="getRenderedMinHeightStyle(el)"
              [style.max-height]="getRenderedMaxHeightStyle(el)"
              [style.transform]="getElementTransform(el)"
              [style.transform-origin]="getElementTransformOrigin(el)"
              [style.backface-visibility]="getElementBackfaceVisibility(el)"
              [style.transform-style]="getElementTransformStyle(el)"
              [style.position]="isNested ? getNestedPositionStyle(el) : null"
              [style.display]="getElementLayoutDisplay(el)"
              [style.flex-direction]="getElementLayoutFlexDirection(el)"
              [style.flex-wrap]="getElementLayoutFlexWrap(el)"
              [style.justify-content]="getElementLayoutJustifyContent(el)"
              [style.align-items]="getElementLayoutAlignItems(el)"
              [style.gap]="getElementLayoutGap(el)"
              [style.grid-template-columns]="getElementLayoutGridTemplateColumns(el)"
              [style.grid-template-rows]="getElementLayoutGridTemplateRows(el)"
              [style.padding]="getElementLayoutPadding(el)"
              [style.overflow]="getElementOverflowStyle(el)"
              [style.background-color]="el.type !== 'text' && el.type !== 'image' ? el.fill : 'transparent'"
              [style.color]="el.type === 'text' ? el.fill : null"
              [style.border]="getRenderedBorderStyle(el)"
              [style.box-shadow]="getElementBoxShadow(el)"
              [style.outline]="isNested ? null : getElementOutlineStyle(el)"
              [style.outline-offset.px]="isNested ? null : getElementOutlineOffset(el)"
              [style.opacity]="el.opacity ?? 1"
              [style.clip-path]="isNested ? null : getElementClipPath(el)"
              [style.visibility]="!isNested && isElementClippedOut(el) ? 'hidden' : 'visible'"
              [style.border-radius]="getElementBorderRadius(el)"
              (pointerdown)="onElementPointerDown($event, el.id)"
              (pointerenter)="hoveredElementId.set(el.id)"
              (pointerleave)="hoveredElementId.set(null)"
              (dblclick)="onElementDoubleClick($event, el.id)"
              (contextmenu)="onElementContextMenu($event, el.id)">

              <ng-container *ngIf="el.type === 'text'">
                <ng-container *ngIf="!isTextEditing(el.id); else textEditor">
                  <div
                    class="text-content"
                    [style.font-size]="getTextFontSize(el)"
                    [style.font-family]="getTextFontFamily(el)"
                    [style.font-weight]="getTextFontWeight(el)"
                    [style.font-style]="getTextFontStyle(el)"
                    [style.line-height]="getTextLineHeight(el)"
                    [style.letter-spacing]="getTextLetterSpacing(el)"
                    [style.text-align]="getTextAlignValue(el)">
                    <span>{{ el.text }}</span>
                  </div>
                </ng-container>

                <ng-template #textEditor>
                  <textarea
                    class="text-inline-editor"
                    [attr.data-text-editor-id]="el.id"
                    [value]="el.text || ''"
                    [style.font-size]="getTextFontSize(el)"
                    [style.font-family]="getTextFontFamily(el)"
                    [style.font-weight]="getTextFontWeight(el)"
                    [style.font-style]="getTextFontStyle(el)"
                    [style.line-height]="getTextLineHeight(el)"
                    [style.letter-spacing]="getTextLetterSpacing(el)"
                    [style.text-align]="getTextAlignValue(el)"
                    (pointerdown)="onTextEditorPointerDown($event)"
                    (input)="onTextEditorInput(el.id, $event)"
                    (blur)="onTextEditorBlur(el.id)"
                    (keydown)="onTextEditorKeyDown($event, el.id)"></textarea>
                </ng-template>
              </ng-container>

              <ng-container *ngIf="el.type === 'image'">
                <img [src]="el.imageUrl" alt="Canvas image" draggable="false" />
              </ng-container>

              <!-- Nested children for containers -->
              <ng-container *ngIf="isContainerElement(el)">
                <div
                  *ngIf="getFlowDragLayoutPlaceholder(el.id)?.index === 0 && getFlowDragLayoutPlaceholder(el.id) as flowLayoutPlaceholder"
                  class="canvas-element canvas-element--flow-layout-placeholder"
                  [class.rectangle]="flowLayoutPlaceholder.element.type === 'rectangle'"
                  [class.text]="flowLayoutPlaceholder.element.type === 'text'"
                  [class.image]="flowLayoutPlaceholder.element.type === 'image'"
                  [style.width.px]="flowLayoutPlaceholder.bounds.width"
                  [style.height.px]="flowLayoutPlaceholder.bounds.height"
                  [style.background-color]="getFlowDragPlaceholderFill(flowLayoutPlaceholder.element)"
                  [style.border]="getElementBorderStyle(flowLayoutPlaceholder.element)"
                  [style.border-radius]="getElementBorderRadius(flowLayoutPlaceholder.element)">
                </div>

                <ng-container *ngFor="let child of getLayoutChildren(el); let childIndex = index; trackBy: trackByElementId">
                  <ng-container *ngTemplateOutlet="elementTpl; context: { element: child, isNested: true, isFlow: isChildInFlow(child) }"></ng-container>

                  <div
                    *ngIf="getFlowDragLayoutPlaceholder(el.id)?.index === childIndex + 1 && getFlowDragLayoutPlaceholder(el.id) as flowLayoutPlaceholder"
                    class="canvas-element canvas-element--flow-layout-placeholder"
                    [class.rectangle]="flowLayoutPlaceholder.element.type === 'rectangle'"
                    [class.text]="flowLayoutPlaceholder.element.type === 'text'"
                    [class.image]="flowLayoutPlaceholder.element.type === 'image'"
                    [style.width.px]="flowLayoutPlaceholder.bounds.width"
                    [style.height.px]="flowLayoutPlaceholder.bounds.height"
                    [style.background-color]="getFlowDragPlaceholderFill(flowLayoutPlaceholder.element)"
                    [style.border]="getElementBorderStyle(flowLayoutPlaceholder.element)"
                    [style.border-radius]="getElementBorderRadius(flowLayoutPlaceholder.element)">
                  </div>
                </ng-container>
              </ng-container>

            </div>
          </ng-template>

          <!-- Render top-level elements -->
          <ng-container *ngFor="let el of topLevelVisibleElements(); trackBy: trackByElementId">
            <ng-container *ngTemplateOutlet="elementTpl; context: { element: el, isNested: false, isFlow: false }"></ng-container>
          </ng-container>

          <div
            *ngIf="getFlowDragPlaceholder() as flowPlaceholder"
            class="canvas-element canvas-element--flow-drag-preview"
            [class.has-independent-stroke-surface]="usesIndependentStrokeSurface(flowPlaceholder.element)"
            [class.rectangle]="flowPlaceholder.element.type === 'rectangle'"
            [class.text]="flowPlaceholder.element.type === 'text'"
            [class.image]="flowPlaceholder.element.type === 'image'"
            [class.frame]="flowPlaceholder.element.type === 'frame'"
            [class.layout-container]="isLayoutContainer(flowPlaceholder.element)"
            [style.--canvas-element-surface-border]="getElementSurfaceBorderStyle(flowPlaceholder.element)"
            [style.left.px]="flowPlaceholder.bounds.x"
            [style.top.px]="flowPlaceholder.bounds.y"
            [style.width.px]="flowPlaceholder.bounds.width"
            [style.height.px]="flowPlaceholder.bounds.height"
            [style.transform]="getElementTransform(flowPlaceholder.element)"
            [style.transform-origin]="getElementTransformOrigin(flowPlaceholder.element)"
            [style.backface-visibility]="getElementBackfaceVisibility(flowPlaceholder.element)"
            [style.transform-style]="getElementTransformStyle(flowPlaceholder.element)"
            [style.display]="getElementLayoutDisplay(flowPlaceholder.element)"
            [style.flex-direction]="getElementLayoutFlexDirection(flowPlaceholder.element)"
            [style.flex-wrap]="getElementLayoutFlexWrap(flowPlaceholder.element)"
            [style.justify-content]="getElementLayoutJustifyContent(flowPlaceholder.element)"
            [style.align-items]="getElementLayoutAlignItems(flowPlaceholder.element)"
            [style.gap]="getElementLayoutGap(flowPlaceholder.element)"
            [style.grid-template-columns]="getElementLayoutGridTemplateColumns(flowPlaceholder.element)"
            [style.grid-template-rows]="getElementLayoutGridTemplateRows(flowPlaceholder.element)"
            [style.padding]="getElementLayoutPadding(flowPlaceholder.element)"
            [style.overflow]="getElementOverflowStyle(flowPlaceholder.element)"
            [style.background-color]="getFlowDragPlaceholderFill(flowPlaceholder.element)"
            [style.color]="flowPlaceholder.element.type === 'text' ? flowPlaceholder.element.fill : null"
            [style.border]="getRenderedBorderStyle(flowPlaceholder.element)"
            [style.opacity]="flowPlaceholder.element.opacity ?? 1"
            [style.border-radius]="getElementBorderRadius(flowPlaceholder.element)">

            <ng-container *ngIf="flowPlaceholder.element.type === 'text'">
              <div
                class="text-content"
                [style.font-size]="getTextFontSize(flowPlaceholder.element)"
                [style.font-family]="getTextFontFamily(flowPlaceholder.element)"
                [style.font-weight]="getTextFontWeight(flowPlaceholder.element)"
                [style.font-style]="getTextFontStyle(flowPlaceholder.element)"
                [style.line-height]="getTextLineHeight(flowPlaceholder.element)"
                [style.letter-spacing]="getTextLetterSpacing(flowPlaceholder.element)"
                [style.text-align]="getTextAlignValue(flowPlaceholder.element)">
                <span>{{ flowPlaceholder.element.text }}</span>
              </div>
            </ng-container>

            <ng-container *ngIf="flowPlaceholder.element.type === 'image'">
              <img [src]="flowPlaceholder.element.imageUrl" alt="Canvas image" draggable="false" />
            </ng-container>

            <ng-container *ngIf="isContainerElement(flowPlaceholder.element)">
              <ng-container *ngFor="let child of getLayoutChildren(flowPlaceholder.element); trackBy: trackByElementId">
                <ng-container
                  *ngTemplateOutlet="flowDragPreviewChildTpl; context: { element: child }"></ng-container>
              </ng-container>
            </ng-container>
          </div>

          <!-- Layout drop indicator -->
          <div
            *ngIf="layoutDropTarget() && !draggingFlowChildId()"
            class="layout-drop-indicator"
            [style.left.px]="getDropIndicatorLeft()"
            [style.top.px]="getDropIndicatorTop()"
            [style.width.px]="getDropIndicatorWidth()"
            [style.height.px]="getDropIndicatorHeight()">
          </div>

          <ng-container *ngFor="let line of snapLines()">
            <div
              *ngIf="line.type === 'vertical'"
              class="snap-line snap-line-v"
              [style.left.px]="pageLayout.getSnapLineX(line.position, page.activePageLayout())"></div>
            <div
              *ngIf="line.type === 'horizontal'"
              class="snap-line snap-line-h"
              [style.top.px]="pageLayout.getSnapLineY(line.position, page.activePageLayout())"></div>
          </ng-container>

        </div>

        <div class="page-shell-toolbar-layer">
          <ng-container *ngFor="let layout of page.pageLayouts()">
            <div
              class="page-shell-header"
              [class.page-shell-header--active]="layout.pageId === currentPageId()"
              [class.page-shell-header--inactive]="layout.pageId !== currentPageId()"
              [style.left.px]="pageLayout.getPageShellHeaderScreenLeft(layout.pageId, page.pageLayouts())"
              [style.top.px]="pageLayout.getPageShellHeaderScreenTop(layout.pageId, page.pageLayouts())"
              [style.width.px]="pageLayout.getPageShellHeaderScreenWidth(layout.pageId, page.pageLayouts())"
              (click)="$event.stopPropagation()">
              <div class="page-shell-header-content">
                <div class="page-shell-header-left">
                  <button
                    type="button"
                    class="page-run-preview"
                    (click)="page.openPreviewForPage(projectId, layout.pageId); $event.stopPropagation()"
                    aria-label="Run preview">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                  </button>
                  <ng-container *ngIf="page.editingCanvasHeaderPageId() === layout.pageId; else canvasHeaderPageNameReadonly">
                    <input
                      type="text"
                      class="page-name-input"
                      [attr.data-canvas-page-name-id]="layout.pageId"
                      [value]="page.editingCanvasHeaderPageName()"
                      (input)="page.onCanvasHeaderPageNameInput($event)"
                      (blur)="page.onCanvasHeaderPageNameBlur(layout.pageId)"
                      (keydown)="page.onCanvasHeaderPageNameKeyDown(layout.pageId, $event)"
                      (pointerdown)="$event.stopPropagation()"
                      (dblclick)="$event.stopPropagation()" />
                  </ng-container>
                  <ng-template #canvasHeaderPageNameReadonly>
                    <span
                      class="page-name-readonly"
                      (pointerdown)="onPageNamePointerDown($event, layout.pageId)"
                      (dblclick)="page.onCanvasHeaderPageNameDoubleClick($event, layout.pageId)">
                      {{ page.getPageById(layout.pageId)?.name }}
                    </span>
                  </ng-template>
                </div>

                <div class="page-device-add">
                  <button
                    type="button"
                    class="page-device-add-btn"
                    aria-label="Add device frame"
                    (click)="page.openDeviceFrameMenu($event, layout.pageId)">
                    +
                  </button>
                </div>
              </div>
            </div>
          </ng-container>
        </div>

        <!-- Page shell selection outline (no resize handles) -->
        <div
          *ngIf="page.selectedCanvasPageId() && selectedElementIds().length === 0 && !isDraggingEl()"
          class="page-shell-selection-outline"
          [style.left.px]="pageLayout.getPageShellSelectionLeft(page.selectedCanvasPageId()!, page.pageLayouts())"
          [style.top.px]="pageLayout.getPageShellSelectionTop(page.selectedCanvasPageId()!, page.pageLayouts())"
          [style.width.px]="pageLayout.getPageShellSelectionWidth(page.selectedCanvasPageId()!, page.pageLayouts())"
          [style.height.px]="pageLayout.getPageShellSelectionHeight(page.selectedCanvasPageId()!, page.pageLayouts())"></div>

        <!-- Selection UI overlay — lives in .canvas-viewport (pans with content)
             but NOT in .canvas-scene, so no scale() transform applies.
             Handles use fixed integer pixel sizes: no sub-pixel squishing. -->
        <ng-container *ngIf="!isDraggingEl()">

          <ng-container *ngIf="hasMultipleElementSelection()">
            <ng-container *ngFor="let el of visibleElements(); trackBy: trackByElementId">
              <div
                *ngIf="isPartOfMultipleSelection(el.id) && !isTextEditing(el.id)"
                class="overlay-hover-outline overlay-hover-outline--selected"
                [style.left.px]="getSelectionLeft(el)"
                [style.top.px]="getSelectionTop(el)"
                [style.width.px]="getSelectionWidth(el)"
                [style.height.px]="getSelectionHeight(el)"
                [style.transform]="getElementTransform(el)"
                [style.transform-origin]="getElementTransformOrigin(el)">
              </div>
            </ng-container>
          </ng-container>

          <!-- Hover outline (visual only, no pointer events) -->
          <ng-container *ngFor="let el of visibleElements(); trackBy: trackByElementId">
            <div
              *ngIf="hoveredElementId() === el.id && el.type !== 'frame' && !isTextEditing(el.id) && !isPartOfMultipleSelection(el.id)"
              class="overlay-hover-outline"
              [style.left.px]="getSelectionLeft(el)"
              [style.top.px]="getSelectionTop(el)"
              [style.width.px]="getSelectionWidth(el)"
              [style.height.px]="getSelectionHeight(el)"
              [style.transform]="getElementTransform(el)"
              [style.transform-origin]="getElementTransformOrigin(el)">
            </div>
          </ng-container>

          <!-- Selection outline + handles -->
          <ng-container *ngIf="getSelectionOverlayElement() as sel">
            <div
              class="selection-outline"
              [style.left.px]="getSelectionLeft(sel)"
              [style.top.px]="getSelectionTop(sel)"
              [style.width.px]="getSelectionWidth(sel)"
              [style.height.px]="getSelectionHeight(sel)"
              [style.transform]="getElementTransform(sel)"
              [style.transform-origin]="getElementTransformOrigin(sel)"
              (pointerdown)="onSelectionOutlinePointerDown($event, sel.id)"
              (dblclick)="onElementDoubleClick($event, sel.id)"
              (contextmenu)="onElementContextMenu($event, sel.id)">
              <ng-container *ngIf="showSelectionHandles(sel)">
                <div class="edge-hit edge-hit-n" (pointerdown)="onResizeHandlePointerDown($event, sel.id, 'n')"></div>
                <div class="edge-hit edge-hit-s" (pointerdown)="onResizeHandlePointerDown($event, sel.id, 's')"></div>
                <div class="edge-hit edge-hit-e" (pointerdown)="onResizeHandlePointerDown($event, sel.id, 'e')"></div>
                <div class="edge-hit edge-hit-w" (pointerdown)="onResizeHandlePointerDown($event, sel.id, 'w')"></div>

                <button
                  *ngIf="supportsCornerRadius(sel)"
                  type="button"
                  class="corner-radius-handle"
                  [style.top.px]="getOverlayCornerRadiusInset(sel)"
                  [style.right.px]="getOverlayCornerRadiusInset(sel)"
                  (pointerdown)="onCornerRadiusHandlePointerDown($event, sel.id)"
                  aria-label="Adjust corner radius"></button>

                <div
                  *ngFor="let corner of cornerHandles"
                  class="corner-zone"
                  [ngClass]="cornerZoneClass(corner)"
                  (pointerdown)="onCornerZonePointerDown($event, sel.id, corner)">
                  <button
                    type="button"
                    class="handle"
                    [ngClass]="handleClass(corner)"
                    (pointerdown)="onResizeHandlePointerDown($event, sel.id, corner)"
                    aria-label="Resize element"></button>
                </div>
              </ng-container>
            </div>
          </ng-container>

        </ng-container>
      </div>
    </main>

    <app-properties-panel
      [selectedElement]="selectedElement()"
      [pages]="pages()"
      [currentPageId]="currentPageId()"
      [currentTool]="currentTool()"
      [selectedFramework]="gen.selectedFramework()"
      [validationResult]="gen.validationResult()"
      [apiError]="apiError() || gen.error()"
      [isValidating]="gen.isValidating()"
      [isGenerating]="gen.isGenerating()"
      [generatedHtml]="gen.generatedHtml()"
      [generatedCss]="gen.generatedCss()"
      [irPreview]="irPreview()"
      (frameworkChanged)="setFramework($event)"
      (validateRequested)="validateIR()"
      (generateRequested)="generateCode()"
      (frameTemplateSelected)="onFrameTemplateSelected($event)"
      (numberInputGestureStarted)="onPropertyNumberGestureStarted()"
      (numberInputGestureCommitted)="onPropertyNumberGestureCommitted()"
      (elementPatch)="onSelectedElementPatch($event)"></app-properties-panel>
  </div>
</div>

@if (contextMenu.isOpen()) {
  <app-context-menu
    [x]="contextMenu.positionX()"
    [y]="contextMenu.positionY()"
    [items]="contextMenu.items()"
    (closed)="closeContextMenu()"></app-context-menu>
}

@if (page.isDeviceMenuOpen()) {
  <app-context-menu
    [x]="page.deviceMenuX()"
    [y]="page.deviceMenuY()"
    [items]="page.deviceMenuItems()"
    (closed)="page.closeDeviceFrameMenu()"></app-context-menu>
}

@if (page.isCustomFrameDialogOpen()) {
  <app-dialog-box
    title="Custom Frame"
    description="Set custom width and height for the new frame."
    [fields]="page.customFrameDialogFields()"
    [primaryAction]="{ label: 'Add Frame', variant: 'primary' }"
    [secondaryAction]="{ label: 'Cancel', variant: 'outline' }"
    (primaryClicked)="page.onCustomFrameDialogPrimary($event)"
    (secondaryClicked)="page.closeCustomFrameDialog()"
    (closed)="page.closeCustomFrameDialog()"></app-dialog-box>
}
