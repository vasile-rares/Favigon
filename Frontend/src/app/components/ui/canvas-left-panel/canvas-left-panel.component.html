<aside class="left-panel">
  <h3>IR Builder</h3>

  <label class="field-label" for="framework">Framework</label>
  <select id="framework" [value]="selectedFramework" (change)="onFrameworkChange($event)">
    <option value="html">HTML</option>
    <option value="react">React</option>
    <option value="angular">Angular</option>
  </select>

  <div class="action-row">
    <button type="button" (click)="validateRequested.emit()" [disabled]="isValidating || isGenerating">
      {{ isValidating ? 'Validating...' : 'Validate IR' }}
    </button>
    <button type="button" (click)="generateRequested.emit()" [disabled]="isGenerating || isValidating">
      {{ isGenerating ? 'Generating...' : 'Generate Code' }}
    </button>
  </div>

  <p class="status ok" *ngIf="validationResult === true">IR is valid.</p>
  <p class="status error" *ngIf="validationResult === false">IR is not valid.</p>
  <p class="status error" *ngIf="apiError">{{ apiError }}</p>

  <section class="layers-section">
    <h4>Layers</h4>

    <p class="layers-empty" *ngIf="layerEntries.length === 0">No elements on canvas yet.</p>

    <div class="layers-list" *ngIf="layerEntries.length > 0">
      <div
        class="layer-item"
        *ngFor="let layer of layerEntries; trackBy: trackByLayerId"
        [class.active]="selectedElementId === layer.id"
        (click)="onLayerSelected(layer.id)">
        <span class="layer-indent" [style.width.px]="layer.depth * 14"></span>
        <span class="layer-type">{{ layer.typeLabel }}</span>
        <input
          type="text"
          [value]="layer.name"
          (click)="$event.stopPropagation()"
          (input)="onLayerNameInput(layer.id, $event)"
          placeholder="Layer name" />
      </div>
    </div>
  </section>

  <h4>IR Preview</h4>
  <pre>{{ irPreview | json }}</pre>

  <h4 *ngIf="generatedHtml">Generated HTML</h4>
  <pre *ngIf="generatedHtml">{{ generatedHtml }}</pre>

  <h4 *ngIf="generatedCss">Generated CSS</h4>
  <pre *ngIf="generatedCss">{{ generatedCss }}</pre>
</aside>
