<aside class="design-sidepanel">
  <h3>Design</h3>

  <section class="panel-section" *ngIf="isFrameToolSelected()">
    <p class="section-caption">Frame templates</p>
    <div class="template-grid">
      <button
        type="button"
        class="template-button"
        *ngFor="let template of frameTemplates"
        (click)="applyFrameTemplate(template)">
        <span class="template-name">{{ template.name }}</span>
        <span class="template-size">{{ template.sizeLabel }}</span>
      </button>
    </div>
  </section>

  <div class="empty-state" *ngIf="!selectedElement && !isFrameToolSelected()">
    <p>Select an element in the canvas to edit design properties.</p>
  </div>

  <ng-container *ngIf="selectedElement as element">
    <section class="panel-section">
      <p class="section-caption">Selected element</p>
      <p class="element-type">{{ elementTypeLabel }}</p>
    </section>

    <section class="panel-section">
      <p class="section-caption">Position</p>
      <div class="field-grid">
        <label class="field">
          <span>X</span>
          <input
            type="number"
            step="0.01"
            [value]="toDisplayNumber(element.x)"
            (input)="onNumberChange('x', $event)" />
        </label>

        <label class="field">
          <span>Y</span>
          <input
            type="number"
            step="0.01"
            [value]="toDisplayNumber(element.y)"
            (input)="onNumberChange('y', $event)" />
        </label>
      </div>
    </section>

    <section class="panel-section">
      <p class="section-caption">Size</p>
      <div class="field-grid">
        <label class="field">
          <span>Width</span>
          <input
            type="number"
            min="24"
            step="0.01"
            [value]="toDisplayNumber(element.width)"
            (input)="onNumberChange('width', $event)" />
        </label>

        <label class="field">
          <span>Height</span>
          <input
            type="number"
            min="24"
            step="0.01"
            [value]="toDisplayNumber(element.height)"
            (input)="onNumberChange('height', $event)" />
        </label>
      </div>
    </section>

    <section class="panel-section" *ngIf="hasFill(element.type)">
      <p class="section-caption">Fill</p>
      <label class="field color-field">
        <span>Fill</span>
        <input type="color" [value]="fillInputValue(element)" (input)="onFillChange($event)" />
      </label>
    </section>

    <section class="panel-section" *ngIf="hasStroke(element.type)">
      <p class="section-caption">Stroke</p>
      <div class="field-grid">
        <label class="field color-field">
          <span>Color</span>
          <input
            type="color"
            [value]="strokeInputValue(element)"
            (input)="onStrokeChange($event)" />
        </label>

        <label class="field">
          <span>Width</span>
          <input
            type="number"
            min="0"
            step="0.01"
            [value]="toDisplayNumber(element.strokeWidth ?? 1)"
            (input)="onNumberChange('strokeWidth', $event)" />
        </label>
      </div>

      <label class="field">
        <span>Position</span>
        <select [value]="strokePositionValue(element)" (change)="onStrokePositionChange($event)">
          <option *ngFor="let position of strokePositionOptions" [value]="position">
            {{ position === 'inside' ? 'Inside' : 'Outside' }}
          </option>
        </select>
      </label>
    </section>

    <section class="panel-section">
      <p class="section-caption">Appearance</p>
      <div class="field-grid">
        <label class="field">
          <span>Opacity</span>
          <input
            type="number"
            min="0"
            max="1"
            step="0.01"
            [value]="toDisplayNumber(element.opacity ?? 1)"
            (input)="onNumberChange('opacity', $event)" />
        </label>

        <label class="field" *ngIf="supportsCornerRadius(element.type)">
          <span>Corner Radius</span>
          <input
            type="number"
            min="0"
            step="0.01"
            [value]="toDisplayNumber(element.cornerRadius ?? (element.type === 'image' ? 6 : 0))"
            (input)="onNumberChange('cornerRadius', $event)" />
        </label>
      </div>
    </section>

    <section class="panel-section" *ngIf="isText(element.type)">
      <p class="section-caption">Text</p>
      <label class="field">
        <span>Content</span>
        <input
          type="text"
          [value]="element.text || ''"
          (input)="onTextChange('text', $event)"
          placeholder="Text content" />
      </label>

      <label class="field">
        <span>Font size</span>
        <input
          type="number"
          min="8"
          step="0.01"
          [value]="toDisplayNumber(element.fontSize || 16)"
          (input)="onNumberChange('fontSize', $event)" />
      </label>
    </section>

    <section class="panel-section" *ngIf="isImage(element.type)">
      <p class="section-caption">Image</p>
      <label class="field">
        <span>Source URL</span>
        <input
          type="text"
          [value]="element.imageUrl || ''"
          (input)="onTextChange('imageUrl', $event)"
          placeholder="https://example.com/image.png" />
      </label>
    </section>
  </ng-container>
</aside>
