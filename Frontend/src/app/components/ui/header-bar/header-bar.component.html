<header class="header-bar">
  <div class="header-section header-section--left">
    <nav class="context-nav" aria-label="Context breadcrumb">
      <!-- Brand Name -->
      <span class="context-brand">Prismatic</span>

      <span class="breadcrumb-separator">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-right"><path d="m9 18 6-6-6-6"/></svg>
      </span>

      <!-- User Part -->
      <div class="breadcrumb-item">
        <img [src]="avatarUrl" alt="User" class="breadcrumb-avatar" />
        <span class="breadcrumb-text">@{{ username || 'user' }}</span>
      </div>

      <span class="breadcrumb-separator">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-right"><path d="m9 18 6-6-6-6"/></svg>
      </span>

      <!-- "Projects" Literal -->
      <a class="breadcrumb-item" [routerLink]="['/dashboard']">
        <span class="breadcrumb-text">Projects</span>
      </a>

      @if (isProjectContext && currentProjectName) {
        <span class="breadcrumb-separator">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-right"><path d="m9 18 6-6-6-6"/></svg>
        </span>

        <div class="breadcrumb-item active">
          <span class="breadcrumb-text">{{ currentProjectName }}</span>
        </div>
      }
    </nav>
  </div>

  <div class="header-section header-section--right">
    <button class="header-action-btn" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Feedback</span>
    </button>

    <button class="header-action-btn" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Project settings</span>
    </button>

    <button class="header-icon-btn" type="button" title="Open folder">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    </button>

    <div class="header-user-menu" #userMenuContainer>
      <button
        type="button"
        class="header-user-menu__trigger"
        (click)="toggleUserMenu()"
        [attr.aria-expanded]="isUserMenuOpen"
        aria-haspopup="menu"
        aria-label="Open user menu">
        <span class="header-user-menu__avatar">
          <img [src]="avatarUrl" [alt]="displayName" />
        </span>
        <span class="header-user-menu__icon" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9" />
          </svg>
        </span>
      </button>

      <app-user-menu-dropdown
        [displayName]="displayName"
        [email]="email"
        [avatarUrl]="avatarUrl"
        [isOpen]="isUserMenuOpen"
        (closeRequested)="closeUserMenu()"
        (logoutClicked)="onLogout()"></app-user-menu-dropdown>
    </div>
  </div>
</header>
