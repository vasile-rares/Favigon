server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the backend container
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Proxy user-uploaded static assets (thumbnails, avatars) to the backend.
    # ^~ prevents regex location rules from intercepting image file extensions.
    location ^~ /project-assets/ {
        proxy_pass http://api:8080/project-assets/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location ^~ /user-profile-assets/ {
        proxy_pass http://api:8080/user-profile-assets/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # robots.txt — serve the real file (prevents Angular SPA fallback returning HTML)
    location = /robots.txt {
        try_files /robots.txt =404;
    }

    # index.html must never be cached — it carries the hashed asset references
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Hashed static assets (JS, CSS, fonts, images) — Angular appends content hash to
    # filenames in production so these can be cached indefinitely (immutable).
    location ~* \.(js|css|woff2|woff|ttf|otf|svg|png|ico|webp|jpg|jpeg|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve Angular SPA — all other routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
